body:
  text: 第六回中日因韓定條約王妃為國罹凶災表的是行路君子到街坊見一位老者氣昂昂那人不解其中的意走上前來問端詳説老丈你為何來生氣對我説説有何妨老者説你休來管我的事現在我是實則在忙那人説要告訴我來替你辦你何必似這樣的慌張老者説你要實則在把我問聽我對你説短長老夫姓李名季用離此不遠我家鄉兒子南學把書念老夫家中賣酒漿這幾年間生意好積下錢財治地方賣買了五頃山田地還有三間小草房一頭我自己家裡住那一頭裡招客商那一日鄰居周芳蓋房子扔木頭壓倒我一堵牆當時老夫就把他問他言語立刻就與我修上一連呆了三天整他也未與我修牆不與我修牆不要緊那客人誰也不住我這鄉都説我的院牆破恐怕丟了他行裝到後我又把他問他説老夫亂喊喊我今上官府把他告試試這個老周芳那人説這個事本來不要緊你何必告他到官場依我勸你拉倒吧回家去還讓他與你來修牆老者説我非是不能忍但是我生成以來就不懼強人生本是一口氣誰肯讓誰把硬漢當有志氣的人兒無人惹無志氣的人兒他必遭殃家與國本是一個理誰不來把軟的傷人人要都像我這樣我管保國家不能亡好氣的總管是好漢好氣的準算是兒郎要是一點氣性也沒有誰能保國定家邦老者説罷揚常長去那人也就走他鄉上場來幾句散言書歸正要聽還得開正張上回説的侯元首點兵要去與日本拼命那不過是説書的一個回頭並從無有那個事情單説侯元首聽罷黃伯雄一片言語只氣的他三煞神暴跳五雷豪氣飛空説道日本人占山為寇打傷人命還説我打了他們真是可恨我非去與他辨白不可伯雄從那邊説道兄長不要如此現在咱國裡的大臣相著日本那交涉局的總理任忠又是當朝大臣朴泳孝的外甥去了也恐怕難我好依我看不如逃跑在外想個方法鼓動鼓動民氣民氣要是全強了然後再治那日本保全咱國家也不落遲晚兄長要是願意我有一個老表叔姓李名正現在平壤作提法司咱們去投奔他那去豈不是好嗎侯弼聽了一聽説道可也是呀這個時候與他們洽治氣也是妄然於是收拾收拾帶了些個財物備上一匹快馬抱著侄兒侯珍騎上馬同著黃伯雄可就撲奔平壤大路來了好一個侯弼小英雄他一心要上平壤躲災星在馬上不住胡叨念説道是像我侯弼真苦情從小裡二老爹娘去了世倚靠著兄嫂度時冬十七歲涉重洋遊美國在學堂廢費了三年苦功回家來不把官來作練民勇預備把那日人攻又不幸哥嫂一齊去了世拋下個侄兒苦伶仃還想著練齊民勇把日人打那知道無故生出事一宗日本人奇峰山上為賊寇傷害那各處的好百姓也是我領兵將他打的苦所以他要害我的活性命多虧了伯雄賢弟來送信若不然我命一定被他坑今日裡要上平壤去逃難也不知李正肯容不肯容還想要謀個方法吹民氣也不知事情能成不能成如果是老天隨了人心願必然展展我的好威風使我那數萬人民改改志使我那國家安隆以安隆使喚那姦臣的賊子全死淨使喚那日本強徒減減雄凶那時節我也創個立憲國我也使那共和主意列朝宗也讓高麗為個獨立國免去受那大國的欺凌正是那侯弼馬上胡思想看了看西方墜落太陽星他這才尋找那個招商店猛看見那邊挑出一燈籠他三人這才進了院拴上馬就住在此店中押下他三人住店且不表再把那二位公差明一明話説那劉陳二位公差領了簽票去拿侯弼走了兩天才到那仁裡村此時侯弼已走了一天多啦他二人尋了幾天也莫沒打聽著下落就回城交票任忠一看沒拿來人後來又一訪聽才知道那日本人妄告不實也就拉倒了這且不表單説日本明治皇帝這日早朝殿頭官宣道各大臣聽真有事出班早奏無事就捲簾退朝忽見伊藤從班部中説道臣有本奏日皇説道愛卿有何本奏伊藤説我主在上聽臣下道來伊藤他未從開口喜洋洋尊了聲我主在上聽其洋高麗國金氏玉均要變法求咱們暗地以裡把他幫也不知怎麼了的不嚴密那中國的兵馬來把咱們坑在漢城與咱打一仗將咱的兵敗到仁川傍想只要因著這個強勢力那知道又受了中國的傷在高麗咱們雖然有勢力還是不趕他們中國強若不先把中國牢籠住怎麼經營高麗那地方不得高麗也是難以分中國不如先拿定一個好主張先與他定下一個大條約在高麗別讓他的勢力比咱強我主你看這事好不好臣就要上那中國去一趟日皇説愛卿之言正合我意你就去辦吧伊藤一見日皇應了聲他這才坐上輪船撲西行論走也得半個月説書的只用鼓捶一不扔這日進了中國界來到了我們那座天津城下輪船就把我總督衙門進見了那通商大臣李文忠這個時候李鴻章已經服滿了所以直隸總督還是他坐著當日見了伊藤説道貴國到此有何事辦伊藤説無事不敢到此只因高麗國中常起內亂咱們兩國常因著這個失和氣今日想要立個條約自今以後高麗要有亂事咱們兩國你告訴我我告訴你咱們兩國合著平定他國之亂也省著害咱兩國的商業豈不是好嗎於是李鴻章就答應了他與他定下條約伊藤可就回國去了列位明公你們想想高麗是咱們屬國有亂咱就與他平了何必跟日本合著去辦呢躲還躲不開哪可以讓他插上手呢高麗滅亡李鴻章也是有罪呀這且不題單説日本領事井上馨在高麗看他那內治一天比一天強打聽著人説這些政治全出於閔後之手他尋思道此人若不除治必為日本之害於是想出一條道來假説請客遂把那親日黨們全部請來酒席筵前説道我看諸公皆有經邦濟世之才可嘆你君不能重用專倚著皇后將來你國必為他一人鬧壞了朴泳孝鄭秉夏諸人一齊説道此事我們也是不願意但是沒有甚麼主見大人若有高見可指示指示我們井上馨説道敝人到有一條拙見諸公願聞聽我到道來好一個多謀多智井上馨他生出來一種狠毒的心看諸公皆有經邦濟世略可惜你君不能善用人專倚著王妃閔後把政掌高麗國將來壞在他的身諸人要想只把國救必得先除治了這個人敝人我有一條小拙見敢在諸公面前陳一陳用銀錢將他左右買服下讓他好與你們留下門得門路將人伏在他宮裡出來時就去把他尋不怕他有多大才與智管教他一命歸了陰我説此道好不好望諸公沈吟以沈吟朴泳孝那邊開言道説這道兒甚合我的心閔皇後他那把門的也曾與我有過親明日我就把他買下合豁上五百兩金與銀現在不怕他不幹錢大就能通了神衆人齊聲説道好他看他一個一個喜吟吟説話之間天色晚各人坐上輪轎子轉家門話説朴泳孝回到家中想起來井上馨告訴他那條道暗説道現在把宮門新換這官姓霍名建修是我一個親戚我要托他去辦必然能成當下命家人將霍建修請來説道大人夤夜將卑職喚來有何吩咐泳孝説無什麼吩咐有一件事想要托閣下辦辦呢建修説大人只管講來何必拘之呢泳孝遂把那話對他一説又拿出五百銀子説道暫以此相奉等事情成的時候還有重謝並且要保你升官霍建修一見這個相應心眼暗暗的就動了説道大人咱們是親戚用著卑職這一點小事那敢不效犬馬之勞朴泳孝一聽樂了當下將自己的心腹有力氣的人挑了八名命建修帶進宮中就説是新招的護衛兵讓他八人把守內宮門閔後要出來的時候必定難逃公道於是霍建修拿了銀子帶著人洋洋得意回到衙中第二日就命他八人把守內宮門專等著行事這且不表單説那閔皇后這日坐在宮中悶悶不樂忽然想起一件大事急命常隨去把寇大人請來就説有事相商常隨去了不多一時寇儒臣到來參見一畢説道娘娘將臣下喚來有何事相商娘娘説卿你不知聽愛哀家道來皇后未從開口面帶悲傷尊了聲儒臣愛卿聽其詳咱高麗現今甚軟弱又被那兩個大國夾中央中國雖然是咱們的祖國看光景也是自顧不遑他國的君臣也是無善政要倚著他不久的就要亡日本子本是一個虎狼國以一起首他那居心就不良又趕上咱國屢屢有內亂姦臣們才勾他們到這鄉纍次的在咱國裡增勢力想必是要奪取咱們地方衆好賊寡光知眼前圖富貴遂把那國計民生仍扔一傍日本國好比一群虎咱高麗好比一群羊羊要靠虎求安泰那羊一定被虎傷那群虎已經入了咱的國想個什麼方法把他抗想只要打還打不過就得忍著氣兒圖自強聞人説日本昨日來請客朴泳孝諸人全都到那鄉看他們必定有點事若不然那能無故飲酒漿他的事咱們雖然不知道大料著準是破壞咱家邦看起來日本所以把野心起全由著咱們國裡那姦黨我今日想把姦黨除治盡愛卿你可有個什麼方哀家我左思右想無主意才把愛卿你請到這鄉寇儒臣一聽這句話尊了聲娘娘千歲聽言良要想除治那姦黨微臣我有計一樁雲在霄鎮守平壤地他那裡馬壯兵又強暗地裡與他去封信讓在霄帶兵離平壤大兵到這漢城地管教那些個姦臣性命喪無常寇大人説罷一些話閔娘娘從著那邊開了腔話説寇儒臣對著閔後畫了一片除賊臣的計策閔皇后説道雲在霄可是掌著十三道的兵權我素常也知道他的忠義但是事情難得嚴密不要走漏了消息才好要是讓他們以一知道就落一個打虎不死反來傷人我看這個事情準得一個快人前去送信讓那神不知鬼不覺就把那姦臣們除治了就是這個人很難找寇儒臣説道送信之人不難微臣有一個族中侄兒名二本良家業零落父母雙亡為我家的管事此人方十八歲有膽量又生了兩條快腿一天能走五百餘裡念了幾年書也很曉得大義要是讓他上平壤送信準能妥適還快當閔後説是既有此人我就寫信明日就使那本良前往説完拿起筆來寫了一封書子交與儒臣説道千萬小心可別走漏了消息要是走漏了消息你我全好不了那寇儒臣諾諾連聲辭別了娘娘出離宮院來在家中將寇本良喚過來説道我命你出趟門願意不願意呀本良説道侄兒蒙叔父厚恩就是赴湯投火侄兒也無有不願意的但不知將侄兒那邊差遣儒臣説你既願意這有書信一封下倒到平壤十三道提督雲大人那塊明日就可前往千萬可不要失落了本良説是了待了一宿第二日清晨寇本良用了早膳帶了盤費拾道掇一個包背在肩上就要起身且説儒臣有一子名喚本峰年方八歲本良天天領著他玩耍所以他跟本良十分親近這日聽説本良要出門他早早的起來稟告他父母説是要送送我哥哥去他父母説你去吧可要早早回來於是本峰領了個老家人跟著本良出門而去這且不表單説那閔皇后自從將寇儒臣送走以後他心中覺著悶悶不樂到了晚間那明月在天越發添了一番愁悶遂令宮娥引路去上那後花園玩賞於是宮娥前頭引路出了宮門好不淒慘也閔皇后邁步出宮庭看了看零露瀼瀼夜色明滿院中習習秋風吹人面各處裡哪哪草蟲亂悲鳴看起來秋冬閉塞無好處那趕那春夏之間物色興我把那強盛國家比春夏又把那軟弱之國比秋冬人人都把春夏盼沒有一個盼秋冬我國家現今就是秋冬季想什麼方法把那春夏生這娘娘叨叨念念往前走不知不覺的進了花園中看了看各樣花草全凋落惟有那幾盆緑菊色香馨説道是隱逸君子你怎麼獨受冷何不與那百般紅紫斗春榮看起來花草也與人一樣那賢智之人多半埋沒草澤中官娥又領著把月臺上好一個寶鏡高懸在太空猛回首望那西邊送一目看見了昏昏將墜一行星咳這行星昏昏將墜無人救那月兒皎皎光寒令人驚行星他照在我們高麗境明月兒臨在日本的東京就著星兒月兒看了一看足見我高麗將滅日本將興皇后觀望一會把臺下宮娥打著燈籠前頭行正是他們往前走忽然間來了人幾名若問他們是那幾個就是那霍建修帶領八名兵走上前把娘娘忙捉住從腰中掏出一根繩用手挽了個豬蹄扣擂勒住娘娘那喉嚨二人一齊速用力那娘娘嗚呼一命歸陰城花園中擂勒死娘娘閔皇后又殺了宮娥人二名將尸首扔在澆花井又聽的人馬鬧轟轟要問那里人馬鬧朴氏泳孝發來兵大兵發到皇官內準被他殺個人頭滾滾血水紅書説此處住一住歇歇喘喘下回聽第七回寇本良千里寄魚書侯元首平壤設租祖帳圖存固國要道總不外乎學問自識之士待子孫全都著重本身先教溫經習禮後教博古通令先生勸勉友人針德業自能前進上場來西江月罷書歸上回上回説的是那朴泳孝發兵是沒有的事情不過是説書的一個回頭間話少説單説那霍建修領著朴泳孝八名家丁把閔皇后擂勒死扔在井內到了天明到朴泳孝的衙門見了朴泳孝説道事情成了昨夜晚上那閔後觀月乘著那個機會我們就把他擂勒死了將尸首扔在澆花井內朴泳孝説道好可以一下子去了我一塊大病霍建修説還有一件事昨日下午閔後將寇儒臣召進宮中不知商量些個什麼事情半晌才出來我看此老也當除治了不然必為後患朴泳孝説我道倒有意除治此賊但是他與那雲在霄最好現在十三道的兵權全在在霄的手中要是把寇儒臣殺了他要知道豈能答應咱們嗎建修説是那不妨卑職有一條拙見管保那寇儒臣雲在霄二賊盡死於非命朴泳孝説你有何計策快快講來霍建修説道大人在上聽我道來好一個霍氏建修狗姦佞要害那寇雲二位乾國卿他説道在霄鎮守平壤地他手下足有十萬虎狼兵寇儒臣與那在霄甚相好要私著磨謀害咱們了不成要想著把他二人除治了敝人我有一計兒甚可行第一要作下一封好假信就説是寇雲二人反心生這封信是那在霄他寫的約會那寇儒臣來為內應下書人兒走錯了將書信送到咱府中金駕鑾殿上把本奏拿著這封信兒作證憑立逼那皇上把旨下好除治那儒臣老姦雄然後咱再派人平壤去把那在霄老兒調進京將他兵權去吊掉了然後咱再把他一命坑這是小人一拙見大人你看可行不可行永老泳孝説正合我的意遂急作了信一封急忙忙把那家丁點齊整帶領著人馬奔皇宮記下他們咱不表急回來把那李熙皇帝明一明話説韓皇李熙那日宿在西宮清晨方才起來有正宮的人來報説道娘娘昨夜帶著兩個宮娥觀月未見回來不知那鄉去了尋找一氣也無蹤影李熙聞言説道這事可也怪了正在那宮中狐疑忽有皇門官進來奏道説是朴泳孝現在午門外候旨李熙聞言急忙忙上朝朴泳孝上殿奏道我主在上臣有本奏好一個朴氏泳孝狗姦雄他在那金殿以上把本升説道是雲在霄現今要造反連聯合那寇儒臣來為內應我主要是不憑信現有他的信一封説罷將信呈上去李熙皇帝用目睜上寫著在霄雲氏三頓首敬啓於儒臣老年兄現如今咱國以內君軟弱我想要奪取他那錦江洪此時我有兵十萬望乞著仁兄與我為內應韓皇他看罷這封信遂把那朴泳孝來問一聲這封信你可是從那得來的泳孝説下書人錯送我衙中臣將那下書人兒獲拿住所以知他們要把反心生望我主速速降聖旨臣好斬那儒臣老姦雄今日要是不把儒臣斬我就在金殿以上來行凶逼的韓王無及計奈他這才寫了旨一封朴泳孝得了皇上旨教軍場裡去點兵點齊了一千人共馬撲奔那儒臣府內行眼前來到儒臣府吵的一聲圍了一個不透風話説朴泳孝帶領著人馬把寇儒臣府團團圍住闖進大門呼道寇儒臣接旨單説寇大人正在屋中坐著尋思那寇本良前去搬兵不知有成無成忽有家人來報説道適才小人聽人説昨夜晚閔娘娘出宮觀月不知那鄉去了現在各處尋找呢正説之間又有家人來報説道大人哪不好了外邊有朴泳孝帶領著兵馬把咱宅子圍住現在院中喚你接旨呢大人快出去看看吧寇儒臣以一聽尋思必是事情泄漏了急忙出了屋中朴泳孝罵道老賊你無故勾引雲在霄作反天子命我前來拿你快快受綁儒臣以一聽這話驚的目瞪口呆知事情必真泄漏了半晌方説道我與雲在霄謀反有何證據咱兩倆得面見天子朴泳孝説道你不用辨別啦天子命我急溜將你斬首再待幾天你那羽翼到來就治不了你啦吩咐聲兵丁你們與我快綁那兵丁忽啦啦上來把儒臣綁了又去屋中把他家人全部綁了來到朴泳孝眼前交令朴泳孝一查只三十七口説道聞人説儒臣家中四十九人怎麼少三口少了別人不要緊他那兒子怎麼也沒有拿來你們與我快搜一會也沒搜著朴泳孝説道一個小小孩童能逃得那裡去先將他們斬首然後再捉他三人也未為遲晚大凡不能出此城中於是將他們拉在車上可就撲奔法場走下來了好一個為國忠良寇儒臣坐在那車子以上淚紛紛只誠曾想搬兵好來除姦黨那知道忽然泄漏巧原因也不知這機關怎麼漏他就要斬我全家共滿門那君王我也不能得見面上何處與他把那是非分滿朝中皆與好賊同一黨是何人能夠與我把冤伸死了我寇氏一家不要緊最可惜大韓江山被人吞聽人説昨夜娘娘去觀月一宿裡未從去上宮內存説話著不知人兒在那裡説死了尸首下落無處尋大概是為那姦賊他們害了若不然怎麼就一夜影無蹤若果然娘娘也是喪了命這機關泄漏就算真好賊們朝廷以內把君迫外邊裡欺壓衆多好子民有朝一日惡賃滿準被那萬把鋼刀把身分有人要把那姦賊除治了老夫我死在九泉也甘心也不知本峰送他哥哥到何處也不知本良侄起身未起身也不知他們哥兩倆知道不知道大料著無人與他送信音果然要有人與他哥兩倆把信送我寇門或者能夠有後根正是大人胡思想眼前來到法場正中心朴泳孝那邊傳下命叫了聲大小兒郎細聽真將法場與我圍好了別讓進來外邊人立刻就將他們斬不要等著那時晨辰軍士一聽這句話將寇氏一家圍在當心在車上將他一家全提下樁撅以上綁住身劊子手虎頭大刀忙舉起克叉一聲血淋淋一煞時寇氏一家全廢命但見那地下人頭亂紛紛法場裡乾韓國忠良廢了命朴泳孝又領著兵丁把他小兒尋五街八巷翻了個遍也未見著寇家一個人押下泳孝尋人且不表再把那本良兄弟雲一雲話説寇本良兄弟與那老院公三人出了家門正走之間本峰説哥哥今日遠行我得遠遠送送聞聽人説城北十里以外有一座集賢館甚是幽雅今天咱們到那裡連與哥哥餞行代觀觀景致哥哥你説好與不好本良説兄弟説好便好於是他三人就往前走到了城外忽見迎面一少年騎馬如飛而來到了跟前搬鞍下馬説道賢弟你往那裡去本良以一看不是別人是那親王李應藩之子李樹蕭此人與寇本良最相好當日在街頭溜馬見了本良背包而行忙問道賢弟你望何處去本良答道我上平壤探親去又問道本峰他跟之作什麼呢本良説他要上集賢館連觀景致代與我餞行樹蕭説不是城北那集賢館嗎本良説正是樹蕭説你在那等著我我到家中取點錢來也到那集賢館去本良説是本良又問道兄長這匹馬在那買的如此之快樹蕭説前日在市上買的此馬一日能行八百里路要像賢弟你那足可能夠跟上這匹馬的步本良説真算是快馬説罷樹蕭上了馬説道你們可千萬等著我於是樹蕭回家那寇本良三人不多一時到了集賢館進了屋中酒保過來到倒上茶説道你三位用什麼飯瞧炒甚麼菜呢本良説是不忙我們還有一位未到呢酒保就過去了他們吃了一會茶又到外邊觀看了一會景致樹蕭也靡來正在著急之時只見樹蕭從外邊慌慌張張進來説道賢弟呀不好不好了本良説怎的了樹蕭説我跟自回到家中聽家人説昨晚上閔娘娘出宮觀月未見回來以後又聽人説朴泳孝在金殿上告你家大人與雲在霄謀反現在那朴泳孝領著兵把你家人全都綁上要去斬首賢弟你快領著公子騎上我這匹馬逃命吧再等一時不走他們必各處派兵嚴拿你那時就走不了啦賢弟你快著吧保全公子性命要緊本良以一聽這個話説道事到這個樣我先把公子保護出去接續寇門香煙要緊遂告訴那老家人説道你先去逃命吧日後打聽準了咱家中老幼的性命如何再與我上平壤送信樹蕭説你不用管他快上馬走吧於是本良抱著本峰上了馬二人灑淚而別樹蕭那馬走路如飛本良暗暗的説道我二人可許能逃出性命走了一時之間連影兒也看不見了遂聽樹蕭遂又跟那老家人説道你隨我來吧日後再與他們送信那老家人跟著樹蕭去了不表單説本良把那馬緊緊加了幾鞭那馬四蹄登空如雲霧一般可就撲奔平壤走下來了好一個寇氏本良小英雄他在那馬上不住緊加功心急只嫌馬走慢不住的緊緊用鞭扔那馬本是一匹追風豹走起來好像雲霧一般同轉眼間就是七八里不多時出了漢城地界中在馬上想起家中老與幼不由的撲簌兩眼落淚痕開言不把別人罵罵了聲朴氏泳孝狗姦佞我與你一無仇來二無恨你為何害我全家活性命幸虧是樹蕭兄長來送信要不然我們兄弟也得把命坑到後來又賜我們一匹馬此馬好比一歡龍龍虎駝我兄弟出虎口好一似死裡逃生我兄弟好比一雙失群雁誰要見了誰欺凌如果是一路平安無有事也算是祖宗以上有陰功我今還帶著娘娘一封信大料著裡邊必有大事情聞聽説娘娘昨夜未回轉那性命八成有死無有生我本是平壤送信一個客那誠曾想成了一雙逃難星滿道上衰草含煙射人目各處的臨崖老樹起秋風各山上樹葉飄零刮刮響各河裡與那天光一色青遠山上片片祥雲才出岫草地裡蕭蕭牧馬乍悲鳴看起來孤客遠行誰不怨況其是身負重冤外邊行到平壤我把雲老大人見讓他速速就發兵大兵發到漢城去好與我家報冤橫一煞時走了六百里看了看玉兔向東升天道黑了也不住店乘著日月色奔前程書中裡押下寇氏兩兄弟急回來把那泳孝明一明話説朴泳孝殺了寇氏滿門又派人尋找本峰五街八巷翻遍了也沒有説道他知道信息有人將他放逃了他要走也必望平壤投雲在霄去遂又派些人馬前去追趕列明公你們想想寇本良騎的是秋追風豹又走了多時他們那裡趕得上那兵丁趕了一程蹤影未見也就回來交令朴泳孝説既靡拿住量其一小孩子能怎的遂又上金殿奏本説逆臣寇儒臣已經除治了那雲在霄是他一黨要知道了也必然作亂望我主再刷一道旨意命霍建修上平壤把雲在霄調進京來先去了他的兵權然後再殺他以絶後患李熙説雲在霄纍次有功説他是作反也靡有甚麼憑據去了他的兵權也就是了那可把他調進京來殺了呢朴泳孝説昏王事情到了這個樣子你還説他不能作反呢今日你要不刷旨意我就先把你這昏王除治了説著就向前去韓皇見勢不好説我刷也就是了於是刷了一道旨意命霍建修上平壤調雲在霄不表單説李熙皇帝回到宮中思想起自己的江山可就落起淚來了李熙皇帝獨坐官中淚盈盈思想起自己江山好傷情滿朝中無有一個好臣宰俱都是貪祿求榮狗姦佞朴泳孝立逼我把旨意下殺了位忠心無二乾韓國卿又派我把那雲氏在霄調不應成承就向我來行凶在霄他要知道其中的事必能夠除淨這幫狗姦佞正是那君王宮中胡叨念忽聽樵樓以上起了更樵樓上打動更幫不緊要想起來閔氏皇后女俊英説道是卿呀你那裡去了為甚麼一夜一天未回宮莫非説你讓姦臣謀害了怎麼也不見你那死尸靈如果愛卿為國把命兒殞叫王我心中怎樣疼就著你一天一夜未回轉你那命大概是歸了枉死城也不知何人將卿你害死也不知你那尸首何處扔也不知害你怎麼無人救也不知你為甚麼出了宮卿呀你死一生只顧你拋下寡人我的是難容是何人能夠與我這來勤政事是何人能夠前來與我治江洪是何人巧修政治安黎庶是何人重定軍章整整兵韓國裡諸般政策皆卿定所以近幾年來得太平愛卿你死不要緊寡人折了一左肱卿你一死我就受了氣心思起怎不讓人痛傷情這君王越哭越痛如酒醉好似萬斜珍珠落前胸正是這君王宮中哭閔後忽聽得金雞三唱大天明押下李熙皇帝咱先不表正表表那重根安幼童話説安氏住在雲霄府光陰似箭日月如梭不覺就是三年之久這年重根年方六歲精神憐伶俐俐就過於旁兒這日雲在霄之弟在岫在霄之子落峰在書房中玩耍看見牆上挂著一張畫上畫著一個小孩在園中拿一把小斧那邊有一棵新折的嬰櫻桃樹旁邊站著一個大人像是斥罵這小孩子的樣子重根不解其意正趕上在霄在屋中看書遂問道此畫是甚麼人的故事在霄見他問的有意思遂告訴他説道此小孩叫華盛頓是美國人那邊一人是他父親原先他父與他一把斧子命他出去遊玩他到園中把他父親最愛惜的一棵樹被他斫折了不多時間他父也到園中見樹倒折在地遂問道此是何人伐的華盛頓直言無隱遂道爹爹呀是我伐的他父見他不説謊話轉怒為喜就把他赦了到後來英國待美國人最暴虐他帶著兵血戰八九年叛英獨立是世界上一個大奇人重根聽在霄説完遂問道此人可學不可學呢在霄説道此人可學又問道得怎麼學呢在霄説得念書重根説舅舅何不請個先生讓我們念書也學華盛頓呢在霄見他説話甚奇遂又想道我國此時甚是軟弱若是出一奇人也是我國的幸福再説我兄弟兒子也全當念書了於是寫了一張請先生的告白貼在門首這日來了一人上前把告白揭了家人將那人領至書房見了在霄在霄問道閣下貴姓高名那里人氏那人説道在下姓侯名弼字元首黃海仁裡村人氏在霄聞言驚訝不已正是英雄想要學賢智來了仁村是正人要知元首怎麼到此且聽下回分解
