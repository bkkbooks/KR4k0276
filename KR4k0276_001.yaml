body:
  text: 第四回吳提督大戰漢城安員外逃難平壤若非各人懷異志文武同心國勢興若是各人懷異志家國安得有太平四句提綱敘過書接上回上回説的是那金玉均領著日本的兵將閔氏兄弟殺了又要立逼他們皇上頒布新法當下驚動了親王李應藩聽説有這個變動急忙跑到中國的使館一説那提督吳長慶委員袁世凱帶領著三千兵馬可就直奔皇宮救駕來了好一個高麗親王李應藩他一到中國使館把兵搬他言説金玉均們作了亂勾引那日本反了天只因為辦事不合起反意他這才領著日兵到宮前可憐那閔氏兄弟死的苦他還要立逼皇上把法變望大人速速發兵馬一到那皇宮把日兵攔吳提督聽説了這個話立刻的點了兵三千出離使館把皇宮奔正遇著日本兵丁在那邊兩下一見就開了戰槍炮之聲震耳炫只聽哨子吱吱的響彈子穿梭心膽寒自晨打到正晌午日本的兵將輸於咱竹添一郎帶領兵丁敗下去吳提督追趕在後邊一連趕了二十里日本兵已到了仁川邊吳長慶還要望前趕袁世凱一邊開了言疾兔反噬是實理窮寇莫追是實言現在不如回去罷好除治他們那作亂的男他這才帶領兵丁回裡走人人得意面帶歡人馬回到漢城地又聽得提督一旁開了言話説吳提督帶領人馬回到漢城吩咐聲大小將官一齊跟我去拿作亂的金玉均衆將官應聲説道是於是來到玉均家裡把他一家子大大小小盡皆斬首可就是跑了個玉均吳長慶尋思一回説他可那裡去了尋找多時並無影迹可也就回了衙門了列明公有所不知只因他們殺了閔氏兄弟他又要上皇宮殺閔後這個時候國王李熙已經知道有亂讓護衛軍把宮門守住金玉均到了一看把守很嚴緊他在那等著日兵來到好一齊闖進宮裡等了多時也不見日本兵來正在無可奈何的時候忽有跟人來報説道不好了日本的兵被中國兵打敗啦金玉均一聽這個消息覺得不好可就想要逃難投奔日本於是走到一個地方幸與那些作亂之人遇在一處可就撲奔上東京大路逃跑押下此事不表單説那日本領事竹添一郎敗到仁川看看後邊追兵回去了他這才放心慢慢的走正走之間忽聽後邊有馬蹄之聲回頭一看只見從那邊來了幾匹馬如飛的一般來至近前並不是別人正是那金玉均後跟著那一群作亂之人彼此各道一些受驚的話於是一齊坐上輪船可就直奔日本走下來了好一個幼小無謀的金玉均他自己坐在船上犯思尋説道是我要變法強韓國那料想事情不成敗了軍家中的老幼不知怎麼樣大料著必教他們滅了門全家的老少若是喪了命豈不是我一人惹起這禍根思想起讓人心中實難忍這都是自己作的怨何人恨只恨自己作事無主意我不該勾引日本去逼君事不成惹下外人胡談論思想起怎不讓人痛傷心玉均他越思越想越難受他不住兩眼撲簌落淚痕哭了聲生身父母難見面數了聲結髮妻子離了身事到如今我可把誰瞞怨到不如身投大海去歸陰正是他自己要想尋短見又聽著跟人過來把話雲話説金玉均正在船上不住哭哭啼啼叨念要去自盡跟人過來勸道大人不要悲傷咱家中或尚未滅呢要是滅了現在死了也是無益不如咱到那日本住上幾年想個方法報仇也就是了金玉均説道咳事到如今也只得渾著鬧去吧於是止住淚痕往那日本進發這日到了日本見了伊藤博文把上項之事説了一遍伊藤説情道是難辦哪你先在我國住著吧我與你我找個差使就在我國居官豈不是好嗎金玉均説道那我可是感恩不盡了這且不表單説竹添一郎見了日皇請敗軍之罪日皇説這不幹你事回去休息去吧日皇又把伊藤博文請來説道現在咱們的兵幫著高麗被中國打敗了咱們可以怎麼對付他兩國呢伊藤説要問怎麼辦法聽為臣道來伊藤他未從開口帶春風尊了聲我皇萬歲臣主公咱們要吞併朝鮮與中國必須時時侵到他們權力中在高麗中國勢力比咱大想個道兒使喚跟他一般同因著這個與那中國把約訂再與那高麗立上約幾宗讓他們賠上咱兵款十三萬要賒著還教他們把利行派一位官員往他國中去連辦交涉代把領事去充今日不把別人派還須那位井上馨我主就當傳旨意讓他們好往高麗行日皇這才傳下旨井上馨奉了王命出了京這日到了韓國內那些個親日黨們亂哄哄一個一個來告訴齊説道我國裡頭不尚公那些個政事全歸女後主把我們這些個大臣一旁扔井君一看他們這個樣就知道他們辦事必不成到明日與那李熙把交涉辦諸般的要求全都應次又看看他國裡的內治不由的一見心內驚不知道甚麼人來把政掌這政治與前大不同儷然有個維新的樣他國內必定有賢能不用人説知道了一定是那王妃閩氏把政柄這個人要是不除治必為我國的咕懂蟲事情辦完本國裡報對著他們的皇上説分明話説井上馨在高麗把事辦完高麗包他們十三萬元兵款作為二分半利又把閔皇后怎麼樣的聰明想只要除治了這些事修了一封信打到本國去了這且不表單説高麗京城有一家員外姓安名喚悅公本是黃榜進土出身娶妻張氏就是那雲在霄的表妹老安人四十餘歲生了一子名喚重根真是長得天庭寶飽滿地閣方圓年方三歲精神憐伶悧俐賽如七八歲的兒童夫婦二人愛如珍寶這一日老員外對著夫人説道現在咱們國裡屢次的起亂要常在這住著恐怕難免刀兵之戮我想要上平壤投奔雲大人那處避難夫人你意下如何夫人道我看這個地方也不可久居員外你説好便好吧於是將家中細軟的東西收拾妥當又把那些個家人使女喚到一處説道我家想要往平壤搬不能把你們全帶去我與你們點東西各奔他鄉去吧遂把些個不帶著的東西全分給他們那些個家人使女各自叩頭謝恩去了留一個家人安成又留了一個老媽套上一輛小車老安人抱著重根上了車子安成趕著老媽坐車外老員外備上一匹馬把門戶倉廩全都封了出了大門可就撲奔平壤大路走下來了好一個員外名叫安悅公他一心要上平壤躲災星細軟的東西全都拾到淨又把那房屋門戶上上封老安人抱著孩子把車上員外他也就上了馬能行忽啦啦出了自己大門外又看那五街鄰舍鬧哄哄一齊的走至跟前把行餞都説道員外今日避亂兵我們不久的也要往外走不能夠常住這個是非坑這個説路途以上加仔細防備那胡匪賊人把路橫那個説要是住店看一看千萬別存到那個賊店中這個説孩子可要包好了躲避著路途以上受寒風衆鄰人一齊説道快走吧不要擔耽誤了你們好路程老員外對著衆人使施一禮説道是有勞列位好心誠現如今咱們雖然分了手望後裡我將來還要回漢城説罷了趕起車子上了路那鄰人一個一個回家中那安成手拿鞭子緊著繞轉眼間就走出了十里程老員外騎在馬上回頭看不由的一陳一陳好傷情獨只為姦臣當道亂國政才使我今日逃難離韓京好難捨我那房間與地土好難舍親戚朋友各西東好難捨家人使女他鄉奔好難捨仁德鄰右患難同拋家業這才望那平壤去也不知到在人家怎待成安悅公正在馬上胡叨念看了看西方墜落太陽星他這才趕著車子把店進住了一宿明日又要行走了些高高凹凹不平地過了些河路碼頭城到晚間住在招商店到白日還是把路登這日正然望前走看見了一座高山把路橫黑珍珍密松林內無人走靜悄悄百鳥林中吱扎鳴老員外一見就心害怕説道是這個地方可是凶常言説逢山就有寇看此處好像有賊蹤咱們不如繞著走那安成拉過稍轉正東方才走出一箭地只聽得後邊發喊聲不用人説知道了一定來了衆賊丁吩咐聲安成快著跑再等一時就要把咱們坑安成聞言忙打馬那車兒好像一陳風只聽得槍兒一聲響員外難保活性命列位要問員外生與死且等到下回書裡再説校者注原文為兄弟和睦家庭順今據書前總目録校改第五回中途路員外逢凶災仁裡村元首施大義自來雄傑之士往往命運不強空乏心志路途忙盡是勞苦現象文王囚於裡孔子陳蔡絶糧生於懮患死安康才是聖賢模樣上場來西江月敘罷書歸上回上回書説的是那安員外出了漢城這日來到黃海道地界看見前面有一座高山攔路這座山兩面盡是黑松林中有一條大道老員外説道此山甚是凶惡必有強盜在此咱家快從那邊繞著走吧於是安成趕車望那邊就跑方才走了一箭多地只聽那後面忽啦啦出來了一伙盜賊有二十多人老員外看事不好可就打馬跑起來了好一個員外安悅公他的那運氣算不通想只要平壤去避難不料想中途路上逢災星日本人占山為賊寇要搶來往行路的公偏趕上員外運不好就遇見這伙日賊兵老員外騎馬頭裡跑衆賊兵步行隨後攻步行沒有騎馬快那賊子這才動無名端槍就把員外來打咕咚一聲了不成把員外打落能行馬太陽一上冒鮮紅中途員外廢了命那車子跑了個影無蹤這伙賊又把車子趕但見那西山以上來了兵咕咚咕咚把槍來放打死了日本賊四名他們才想往回來跑在後邊人來了二百多兵兩面夾攻把他來打僅僅跑了賊子四名押下賊子逃命且不表再把拿賊子的英雄明上一明話説高麗黃海道仁裡村出了一位英雄姓侯名弼表字元首從小父母雙亡有一哥哥名佐字元良將他養活了七歲上學念書至十七歲聽説美國學堂甚好他就辭別哥嫂上了美國在他那陸軍學堂住了三年學成了一身兵式體操之法滿腹出兵戰陳之方他回到家中也不去做官就在這仁裡村將他屯中的那些少年挑了三百餘人立了農備學堂買了些個快槍天天教他們下操臨近有賊他就率領農備兵盡力出剿所以他那地方沒有賊匪光陰如箭不覺的就是三年之久那些少年全操練好了又續了二百餘人仍就舊的教練預備教練多了好打外人趕上他那時運不好哥嫂又一齊下世拋下一個侄兒名喚侯珍年方七歲他教他念書自己也不娶媳婦這日正在屋中看書忽見外邊有人來報説是離這十五里地有一座奇峰山那塊有一伙日本強盜在那裡途劫戶搶甚是凶惡特此報知候弼一聽這個信息就點齊了自己練的那些農備隊前去打賊正趕上那安成趕著車子跑過來他上前就問説道你們跑甚麼安成説道我們是往平壤去的路過這個山出來了一伙日本賊人嚇的我就跑我們的員外還在後邊呢不知性命如何你們快去救他吧元首道我正是打賊你們可在此等著待我們打走了賊然後再把你們送過山去吩咐已畢他可就率領著兵前進走不多時只見那邊日本賊趕過來他們可就一齊開槍將日賊打死了無數只跑了四個於是他又轉過山頭往前一看只見那道口躺著一個死尸知道必是安員外被賊打死了急令人拾著到安成的車前説道你來看看這個死尸不是你的主人麼安成一看正是那員外急忙跑到車前説道太太呀不好啦員外被賊打死了老安人一聽這話慌忙把公子交與老媽跳下車子一看可就哭起來了老安人一見員外喪了命不由的兩淚淋淋放悲聲説道是只想逃難得好處那知道中途路口把命坑早知這樣事情也不能走倒不如在那漢城住幾冬那管他日本作亂不作亂或者還不能死在他手中現如今躲還未能躲出去尋思起那樣重那樣的輕小嬰兒未滿三四歲是何人能夠教把名兒成丈夫呀你死一生只顧你拋下了我們母子苦令丁伶仃叫丈夫你在陰城等一等我與你一同去那枉死城老夫人越哭越痛如酒醉忽然間一口濁痰到喉嚨咕咚一聲倒在流平的地那邊裡嚇壞家人老安成走上前一看安人閉了氣他這才捶胸跺足放悲聲叫了聲太太你快醒來把吧多歸陽世少歸陰城太太呀你令今若是歸陰去我們那公子可是誰照應你看他前邊拍來後邊打太太招呼的不住聲老安成招呼了多一會只聽的安人那邊哼一哼話説安成招呼了多一會只聽太太哼了一聲從口中吐出了一塊濁痰哎喲的一聲説道可把罷了我啦衆人一見太太活了一齊上前勸導説太太不要悲啼了人已經死了哭也無益候弼又説道太太不要悲傷大道也不早了先把員外的尸首抬到我們的莊上買口棺材成殮起來然後再送你母子上平壤豈不好麼安人聞言説道那們樣我母子可就感恩不盡了遂問道義士高姓大名侯弼答道敝人姓侯名弼表字元首這仁裡村的人氏安人説道就是侯義土了遂即拜了一拜元首連忙還禮説道請安人上車吧於是安人上了車子元首又讓兵士抬著員外的尸首回到莊上將安太太讓到他的家裡安置好了又命家人上街上罵買了一口棺材把員外成殮了到了次日擇了一塊吉地埋葬起來太太送靈回來又住了一宿第二日命安成套上車子就要起身元首堅留不住他就派了四名人前去護送安人對著元首説道義士請來上座受賤人母子一拜吧老安人未從開口淚盈盈尊了聲元首義士你是聽我夫妻帶著家財去逃命不料想中路上有災星我丈夫被那日人活打死我母子也是幾乎把命坑多虧了義士率兵來搭救才保全我母子的活性命到後來又將我們收留下還埋葬我的丈夫死尸靈這恩德真是高如山來深似海怎叫我生死存亡不感情請義士快來上邊坐使我母子一拜盡盡這點誠侯元首再三推辭説不可老安人説不受拜來可不中侯元首無奈這才上邊坐老安人母子雙雙拜流平拜罷起來又把話來講賤人我現在還有一事情望義士千萬不可不應允鄙人奉送物一宗我孩兒帶著一塊石如意增贈與義士莫嫌輕説完了就將如意遞過去侯元首説道夫人你可不要把意生日本人奇峰山上為賊寇無故的把咱韓國來陵凌咱全是韓國的好百姓外人要欺服負就當把他攻打他們本是我們應盡的職這本是算不了甚麼恩情太太哪你快快把車上趁這天道暖和奔前程安人他使拖一禮來把車上那四名護送莊丁隨後行侯義士送了一程才回去那車子順著大道走如風到夜晚不過住在招商店到白天還是奔走前程曉行夜宿非一日這一天到了平壤城進了北門往南拐來到了雲府大門庭走這安人二門以外把車下驚動了裡邊那些衆家丁話説安太太這日到平壤裡拿出二十兩銀子賞了那四個護送人吩咐他們回去找著雲府進了大門下了車子內裡家人慌忙稟報雲老夫人老夫人急忙接出門外讓到座中坐下説道表妹一路勞苦哇又説甥兒長這大了這個時候雲大人聽説也過來了大家見禮已畢雲大人問道妹子給何人穿的孝夫人答道要是問我穿這孝真是讓人一言難盡了老夫人未從開口淚漣漣尊了聲表兄夫人聽我言在京城因為日本常作亂我夫妻才想逃難到這邊帶了些細軟東西把路上這一日到了那座奇峰山日本在此山為賊寇打劫那來往客人賣路錢正趕上我們車子從那走聽見那松林以內喊連天慌忙的趕著車子往來前跑那賊人此時已經出了山用槍兒把你妹夫活打死因這個我們母子把孝穿雲大人聽著説道妹丈被賊打死真是悲痛可就哭起來了雲大人聞言淚紛紛罵了聲惡賊日本人我妹丈與你何仇並何恨最不該傷他性命害他身你看他家中老的老來幼的幼老幼無能甚難雲老的也有四十歲幼的未滿三四春那人沒有一片忍日本害人好恨狠心我若是拿住日本狗黨子扒皮剜眼報仇痕恨話説老大人傷感已畢遂又問道妹妹妹丈被賊打死你們母子怎麼逃出來的呢夫人説表兄不知聽我説來安夫人未從開口淚盈盈尊聲表兄你是聽我們車子趕著頭裡跑那後邊賊人追趕不放鬆幸虧是步行沒有車子快到後來來了一幫救命星仁裡村有義士侯元首領了人馬打退那些衆賊兵又將我母子留到他莊上因此才逃了活性命雲大人説道元首到算個義士夫人説還有好處呢那義士又買一口好棺材成殮起你那妹夫死尸靈成殮後又埋在一塊平川地全是那元首義士好恩情到後來又把兵丁派我送因此半路這才得安寧老安人説罷一些前後話雲大人在那邊又問一聲話説安太太説罷員外被害的原由又把那侯元首怎樣的除賊怎樣的殯葬員外怎樣的派人護送説了一遍雲大人從那邊問道他派那人可是在那呢夫人説道我已吩咐回去了雲大人又説道妹丈已死了你們母子就在這住口下罷趕外甥長大的時候與我那在岫兄弟跟落峰孩兒請上個先生讓他們一齊念書學問成了然後再治服那日本以與妹丈報仇吧安太太又説從今而後就免不了在你們這招擾啦在霄説表妹你説的是那裡話呢咱們雖然是表兄弟也不亞如親兄弟望表妹無存意見才好安夫人説道那我是感恩不盡了按下安太太住在雲府不表單説那日本惡賊被侯弼打死了無數只逃走了四個賊這個四個人打聽了一會才知是那侯弼的農備隊他們可就想出道來説道這人若不除治後來必為我國之害於是這些個惡賊到了那黃海道交涉局裡去告侯弼甚麼教叫交涉局呢就是外國人與中韓國人打官司地方這四個人到了交涉局把侯弼告了説道他們是商人去上仁川買貨路過那奇峰山被那仁裡村侯弼領了些兵丁拿我們當作了賊將我們打死了無數搶奪去我們的財物錢幸虧我四人的腿快才跑出來望交涉局大老爺速速與我拿人這交涉局的總理姓任名忠那朴泳孝的外甥當日接了這張呈子忙派了劉陳二位衙役去上仁裡村拿侯弼這且不表單説這交涉局中有一位先生姓黃名伯雄他與侯弼八拜為交父母雙亡所以在外邊當差當日得了這個信息暗説道侯弼是義士那能辦出這個事情呢其中必然有差或者是他得罪了日本人想只要害他也有的我不如先與他送上一信免了這禍豈不是好麼於是拾道掇拾道掇騎上坐馬可就奔仁裡村走下來了好一個多端智謀黃伯雄一心要與那侯弼把信通説起來元首本是一義士萬不能作出這樣惡事情想必是他把日人得罪了若不然怎能告他到官中看起來那恨狠毒日人必將他害要使那義士一命歸陰城我今要不與他把信來送他必然遭在日人毒手中你看他叨叨念念來的快仁裡村不遠就在咫尺中進了村屯轉個灣兒往東走眼前裡就是元首大門庭大門外甩蹬離鞍下了馬柳陰樹拴上他那馬能行邁大步進了元首上房內正趕上元首那裡來用工猛抬頭看見伯雄把屋進他這才站起那身形在了就道是賢弟幾時來到此望賢弟恕我無禮失遠迎慌忙的拉著伯雄他坐下賢弟呀今日可是刮的那陳風聞聽説你在衙門當書手你怎麼能夠來到此地中伯雄説兄長你是不知道日本人告你無故來行凶他們説你們聚衆行霸道因搶財傷了他們又幾名現如今交涉局裡把你告那任忠已經準了他的呈不久的就若派人來拿你你快快的拾道掇拾道掇把路行再等一時若不走你的命就怕保不成小弟我因此來送信望兄長千萬躲躲這災星侯元首一聽這些話不由的無名大火往上沖吩咐一聲快點隊立刻間點齊五百農備兵點齊兵馬就要走一心要與那日本把命拼説到此處咱們住一住歇歇喘喘你們再聽
