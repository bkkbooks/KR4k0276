body:
  text: 英雄淚清冷血生提要清代小説四卷二十六回見於繡像英雄淚國事悲合刻署雞林冷血生著其真實姓名不詳曾編小説時報之陳景韓常以冷血為筆名二者是否有關録以待考存上海書局石印線裝袖珍本行文屢稱我大清自序又説庚戌仲秋日韓合併遂援韓國滅亡之原因及結果成一書以鼓民自強為宗旨凡三越月而是書遂成知約作於年末至年初此作以朝鮮愛國志士安重根刺殺伊藤博文為主要線索寫出了日本吞滅朝鮮後的慘痛情景以及朝鮮志士奮起救國的事迹書中重大事件與主要人物大都有史實為依據為第一回到第七回寫日本政府起用伊藤博文逐漸使國力強盛起來轉而策劃逐步吞滅朝鮮和進而制服中國朝鮮處於被日本吞噬的危險境地安重根由父親帶領到平壤在愛國將領雲在霄處避難但在途中其父被日人殺死愛國志士侯元首因進行反對日本侵略的活動失敗被迫也到雲家作家庭教師從而與安重根等結為愛國志士第八回到第十六回一方面寫日本力圖攫取控制朝鮮內政外交的大權一方面寫中國由朝鮮事件引發與日本的戰爭但因清廷腐朽而使中國在戰爭中慘遭失敗李鴻章簽訂馬關條約承認朝鮮脫離中國而歸屬日本在此背景下侯元首組織愛國學生安重根等到美國留學並籌辦報館宣傳愛國主張第十七回到第二十二回寫伊藤博文等在朝鮮建立總監府殘害朝鮮民衆侯元首返國後與民衆一起反抗日本侵略但他為救學生不幸犧牲第二十三回到第二十六回寫安重根與同志合作一舉刺死伊藤博文被捕後英勇就義書尾以朝鮮被日本公然吞併大量愛國志士慘遭殺害人民陷入更深的苦難向中國讀者發出警號此作洋溢著清末進步小説中珍貴的危機感使命感和愛國主義精神作者自序中説欲新一國之民不可不先新一國之小説蓋小説所以振人之血氣啓人之心思者也作品意氣蓬勃結構宏大其不足處在於掌握小説藝術技巧方面尚較粗疏語言力求通俗淺顯運用了不少東北的方言俗語真實可親但提煉不夠楊揚序欲新一國之民不可不先新一國之小説蓋小説所以振人之志氣動人之隱微也庚戌仲秋日韓合併其事關係奉省之命脈中國之存亡巨而且急是中國志士電激於腦想溢於胸急求保全之策吾校同人有感於此遂立同志會命餘編輯小説以鼓吹民氣餘自愧譾陋本不堪勝任因同志責之甚殷遂采韓國滅亡之原因編輯成篇當即石印吾國中諸同志瀏亮是書必可激發愛國之熱誠有斷然也冷血生自序目次卷之一第一回大院君虐待耶穌教閔泳駿誤擊日兵船第二回定商約院君歸政攻使館日本興師第三回廢院君王妃擔國政謀變法新舊起衝突第四回吳提督大戰漢城安員外逃難平壤第五回中途路員外逢凶災仁裡村元首施大義卷之二第六回中日因韓定條約王妃為國罹凶災第七回寇本良千里寄魚書侯元首平壤設租祖第八回雲在霄首誅袒日黨金有聲始倡興東學第九回金玉均寄書完用東學黨作亂全羅第十回洪啓勛兵敗古埠侯元首義説有聲第十一回中國平定東學黨日本改革朝鮮政第十二回中日交兵由韓國德美説和為友邦第十三回李傅相定約馬關日政府監督韓國卷之三第十四回懮國弱英雄別母患學淺志士遊洋第十五回安重根路收三義友金有聲店結九良朋第十六回英雄同入美學校侯弼集股開報館第十七回伊藤拜受統監印韓國坐失行政權第十八回索國債監理財政傷人命強奪警權第十九回日人肆行淫婦女韓國又失審判權第二十回農失懷恨倡革命婦女因仇起義團第二十一回本良返國倡自治嶽子復仇刺統監卷之四第二十二回侯元首為徒殞命寇本良微服出奔第二十三回安志士歸國吊恩師雲在岫義倡愛國會第二十四回安志士中途逢故友伊相國哈埠受凶災第二十五回李完用賣國求榮金洪疇兵敗逃走第二十六回既合併英雄徒落淚未瓜分國事宜關心第一回大院君虐待耶穌教閔泳駿誤擊日兵船莽莽星球亙太空古來不與現今同圖存固國無他策只在人民鐵血人民各負責任豈可苟且偷安若皆事事委權姦必兆滅亡之漸朝鮮覆轍在先前車後車之鑒圖存首重鼓民權不然危亡立現西江月罷引場詩句內引出一部書來此書名曰英雄淚就是那高麗國這些年間受日本的欺侮跟今日隨了日本的事情內裡有忠臣孝子為國損捐身的故事姦臣賊子賣國求榮的典故忠孝節義靡有不全的列明公你們想想咱們中國人素常日子都管人家高麗人叫小國人你看這小國的人當亡國的時候尚有這一班愛國英雄我們中國現在這樣軟弱東三省眼睛看看就要讓日俄瓜分了恐其不能趕上人家那小國人要到那個時候人家該管咱們叫亡國人啦那位説啦日本滅高麗怎麼還要滅中國呢列位不知你們沒聽見這幾年間外面傳言説是外國要瓜分咱們中國嗎怎麼叫作瓜分呢就是拿咱中國當作一個瓜切成幾塊人家外國一家分一塊的意思想想咱們東三省緊靠著日本跟俄國要是分的時候必讓日本跟俄國分了日本要分東三省所以先把高麗滅了高麗緊靠著咱們吉林跟奉天要得高麗望這邊發兵必定容易因為這個日本滅高麗緊接著要分咱們東三省了現時日本與俄國人和了好了他們一和好就是要合著分東三省高麗已經讓日本滅啦東三省也就快完啦高麗當亡國的時候那些英雄豪傑忘身殉國的很多我們現在雖然未分也當酸心落淚怎麼説呢日本一下手就想要滅咱這兩下如今高麗亡了他未來分咱們是怎麼的呢還是有點怕咱們這些民要是咱們還拿著高麗滅亡一點不關心人家可就要下手啦我們這個時候要是尋思怎麼應當不酸心而落淚呢還有一件我們東三省人都喜歡俄國煩惡日本都説是日本是個窮國俄羅斯是富國俄國以已到我們這邊來不大離的人都有了錢花那知道俄國那是邀買人心的計策有一部國事悲諸公看一看可也就知道他們都是一個樣子了要看見那國事悲跟現在咱們小説這部書一聽日俄對待亡國人那個毒辣的樣子真是讓人説不愛説聽不愛聽回首想想我們的國家這個危急的樣法咱們當百姓的當想個什麼法子以愛這個國呢可斷不要願意隨俄國那國也是不好哇以上所説這些話靡別的意思不過讓我們聽書的列位知道一知道亡國的慘狀也就是了間話少説書歸正傳列明公愜言落坐聽在下喉嚨啞嗓奔瓜吊字慢慢的道來表的是混燉初開天地分陰陽交泰生出人盤古時人間披樹葉人皇氏才留下穿衣襟伏羲氏創下烹飫火食法神農氏嘗草傳醫到如今黃帝時間文物備衣冠禮樂煥然新歷代帝王都是他的後所以我們漢人稱曰黃帝子孫黃帝以後曰唐虞揖讓天下重人倫堯舜之世洪水為患茫芒大地無處存身後有那禹王治水山川走分出來九州疆土安萬民這帝舜見禹功勞大才將天下讓他為君夏家天下四百載桀王無道信姦臣成湯起義南巢放一統山河屬於殷商家天下六百載出了一君叫紂辛紂王信寵妲姬女剮剔孕婦剖賢人心作威殺戮毒四海周武觀兵到孟津牧野以誓武誅紂將其子祿父封於殷紂王有個庶兄叫箕子一心不為周家臣到後來箕子封於朝鮮地才留下高麗這國人漢武時高麗為那三韓纂所以又管高麗叫韓民唐太宗伐遼過東海斬其大將名蓋金由此世世服中國年年進貢歲稱臣論起來高麗也是黃帝後他與我國本是同種又同文現今高麗滅亡人人曉衆明公聽著怎麼不關心這本是高麗已往實情事要聽還得開正文今日不把別人表表表日本伊藤君話説日本國明治初年間在西京地界出了一位英雄名喚伊藤博文此人幼時讀書勤力修成了滿腹經綸嘗抱勤王開國之志氣吞宇宙之心每逢鄉中有可辨辦之事情他勇往直前不顧性命的去作有一日在屋中悶悶不樂遂拿起筆來照著自己的志向題了一首詩詩曰豪氣堂堂橫太空日東誰使帝威隆高樓傾盡三杯酒天下英雄在眼中他題這一首不要緊可就被各處念書的人知道了一個傳兩兩個傳三傳來傳去傳到他們國王的名下國王一看這首詩乃召文武百官上朝文武百官來到金鑾殿上三呼禮畢國王命常隨官搬過幾把椅子來賜各大臣坐下衆臣謝恩已畢一齊坐下説道我主將臣等喚來有何吩咐國王道無事不敢勞動衆卿今日寡人有一件要事衆卿不知聽寡人道來明治皇未從開口笑欣欣叫了聲衆卿不知聽王雲日本國不過區區彈丸地想只要增長國勢必用賢人若等到數年以後人滿為患殖民之地咱們何處去尋現如今中國昏昏在夢裡那朝鮮不修內政竟愚民我看那朝鮮將來能為我有東三省亦可接著往前吞這兩樣事情雖是甚容易然必須本國內先立住根聞聽説伊藤博文學問好王有心用他為個外交人先命他歐美各國訪政治回來時籌備立憲固邦根憲政成然後通行蠶食策那時節不怕無地就怕無人因此才寡人來把衆卿問望衆卿各抒抒所見向王陳這君王説罷了前後一些話又聽那內閣尚書尊聲聖君日皇説了一片言語內閣尚書木戶起身奏道我主既願用伊藤為官此事甚容易微臣府下有一先生名喚麥田春此人素與伊藤博文有舊也嘗在臣跟前誇講伊藤之才我主今日可備些聘禮命麥田春明日就去請他那伊藤斷無不來之理日皇聞言哈哈大笑説道事情可也真湊巧寡人正愁聘請無人怎麼就有這麥田春呢急命常隨官備下千匹細錦五百兩黃金國王親自修了一封聘賢的書子又命人上木戶府中喚來麥田春麥田春來在金闕之下俯伏在地口尊萬歲喚小人那邊差使國王説道這有一封書子細錦千匹黃金五百兩你拿著去上西京請那伊藤博文前來居官明日就要前去不要遲延麥田春説遵命於是帶了書子拿了金帛歸本府去了日皇又命打典退朝諸大臣各歸府下不表單説麥田春來在木府歇了一宿第二日清晨起來用了早膳收拾了行裝拿了盤費帶了二個跟人備上三匹快馬行李聘禮捎在馬後上了坐騎可就撲奔西京走下來了好一個為國求賢麥田春他不住馬上暗沈吟説道是我皇今日下個求賢詔他命我西京去請伊藤君伊藤博文本是當今一豪傑若出世必能為國建功勛麥田春正在馬上胡叨又見那百般紅紫斗芳春見幾處堤邊緑柳垂金線見幾處隴陌佳禾色色新又聽那百鳥林中音百囀千家的婦女笑言頻漁子河邊來垂釣樵夫深山動斧斤走過了三里桃花鎮又過了五里杏花村杏花村裡出美酒桃花鎮裡出美人一路有花也有酒花酒難留有事人簡斷捷説來的快這一日來到伊府門甩蹬離鞍下了馬又只見院中走出一個人話説麥田春這一日來到伊藤門首搬鞍下馬正要上前去問只見從院中走出一個人來麥田春擺手問道此是伊家嗎那人應道正是你們是那方來的客人呢麥田春道你且莫要訊問快去房中稟報就説有東京麥田春來訪那人聞聽急急忙忙跑到了上房正趕伊藤在屋中看書家人説道稟爺爺得知外面有麥田春先生來訪伊藤聞言慌忙走出上房來到門外二人對面行舉手禮命家人將僕人馬匹安置別處次將麥田春讓到上房分賓主坐下各道數年不見的思情又見家人獻上茶來茶罷擱盞伊藤道今日可是那陳風把賢弟你吹來的呢麥田春道兄長有所不知只因國王見了兄長之詩甚有愛才之意故命小弟前來相聘現有國書信並聘禮在此乞兄長過目伊藤接過書信