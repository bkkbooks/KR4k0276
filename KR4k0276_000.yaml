高麗本是我國的屬國現在他要插手奪權與我中國很有不便要是高麗歸了日本保護離我們東三省就近啦要到那個時候我們東三省也怕不好急忙的修了一封書子到電報局打到北洋大臣這來了這個時候北洋大臣李鴻章丁懮張樹聲署理當日接了黎庶昌這封電信扯開一看但見那上寫著駐日領事黎氏庶昌把事陳敬稟我國的北洋張大臣大院君無故的作了禍亂他攻了日本領事衙門現如今日本派兵把高麗問一心要凌虐他國的君與民那日本不過區區三島地所以生出來這樣狗狼心伊藤博文也曾畫過策他要把中國與那高麗吞想要吞並中國的東三省不得不先在高麗把力伸與高麗私自訂下通商約又安上花房一位領事臣因為攻了他們的領事館又要在他國中把兵隊屯牛全忠殺了日本人幾個讓高麗賠他們五十萬金他們的勢力要是比咱大那時節咱東省難保存現今他們發兵高麗去咱們也當發去多少軍要有亂咱先與高麗平了千萬可別讓日本進了身日本原是個貪財的窮國不可不防備他的虎狼心大帥哪你可別拿這事當兒戲關係于咱中國實在是深望大人速速發兵高麗去先除治了他作亂的人然後與他國説和了結事或者能夠保全了衆人民這本是至理名言真情事望大帥仔細尋思一思尋張樹聲看罷庶昌這封信不由的腹內沈吟好幾沈吟話説直隸總管張樹聲當下看了黎庶昌這封信他思尋道日本發兵去上高麗問罪這個事情與我國關係非輕我要不去救他將來不但於我自己不好那萬人的罵也是挨不起的於是派了提督丁汝昌與那馬建忠駕了兩隻快船領了五千兵望著渤海口進發一晝一夜到了高麗這個時候日本兵也到了我國的兵先把那大院君廢了又殺了他那一同作亂的一百七十多人日本一看咱國把高麗的亂平了他就要求高麗賠他們的款並且許他們在領事館駐兵還得派人到他國去謝罪高麗因為自己缺禮只得應許賠了五十五萬元的款現在無錢作為借貸行上三分息指釜山地方作保日本又新派了一位領事竹添一郎公使館裡又安上二千兵我國看他公使館安兵我們也留了三千兵駐高麗高麗又打付金玉均去往日本賠罪當下事情完了兩國餘兵全回國去了這且不表單説高麗大院君廢了李熙皇帝本是個軟弱無能的人所以國事全靠著閔皇后去作這日間暇無事閔後對著李熙可就講談起來了閔皇后未從開口笑嘻嘻尊了聲我主洗耳請聽之咱高麗自從開國享安泰為今計應當急急修國政日本他欺侮咱國不為別的大概是要奪咱國好土地今日裡受了他們日本欺好保護咱們江山與社稷李熙説愛卿之言甚有理咱這國就依著你去治理皇后他這才整頓國內一切事學堂巡警立了一個齊審判廳譜議院全然安下蠶桑局官錢號立在城西飛虎營改作了陸軍隊火藥場變成了工程局數月之間籌辦了一個備喜壞了他們皇上名李熙説卿呀你能如此來治國往後還怕的什麼外人欺皇后説還有一件頂大事就是那賣國姦賊金宏集日本子所以來到咱這裡全然是宏集姦臣引誘的依奴看不如把姦臣除治了省著他倒賣咱國錦社稷李熙説事事樣樣依著卿辦你説怎的就怎的他這才刷了一道黃聖旨派了那內務大臣名寇基寇儒臣領兵就往金府去不一時到了他那金府裡吩咐聲兵丁與我快來綁把他那全家綁了一個齊這一回拿了八十單三口一個也未跑出去拉著從那街上走又聽那庶民人等把話提這個説姦臣今日惡貫滿那個説這也是他自取的這個説往後不能把日本引那個説再想要貪贓不容易不言那百姓間談論再表那監斬大臣名寇基押著犯人到法場勾了絶就把招子披讓他們一齊跪倒樁抉橛下劊子手提刀候之説是一聲時晨辰到了劊子手鬼頭大刀忙舉起只聽那追魂大炮三聲響那姦賊一命可就歸了西一家人個個全殺死寇大人這才回城交旨意寇大人交旨已畢回府去李熙皇帝也退回宮裡此事押下且不表再把那金玉均日本賠罪提一提話説金玉均奉了國王之命去上日本賠罪這日到了日本見了日皇呈上謝罪書子伊藤博文從旁説道有勞貴國了玉均説道只因鄙國得罪了貴國理應前來謝罪豈敢言勞各説了一些謙恭的話可就散了朝啦於是把金玉均送至驛館安歇這金玉均到了驛館暗暗的想道日本因變法才強的現在我國也是很軟弱朝裡用事的都是閔族我不如向伊藤説教他助我一膀之力我也變法強強我們高麗他尋思了一回説道就是這個主意到了次日見了伊藤可就把這意思説了伊藤聞言暗想道他們要變法讓我助他他要一變法必定起內亂我好乘他的亂以行事豈不是好嗎於是向玉均説道你們要變法這也是好事我就與我國領事寫一封信他那也有兵讓他在那幫助你不好嗎玉均説道很好事成以後重重相謝當下就辭別伊藤回國到了國中見了滿朝文武説道現在咱國甚是軟弱必得藉外國扶助才能保存咱們可是依靠日本呢可是依靠中國呢於是也有説中國軟弱不可靠的也有説日本詭詐不可靠的當下就分出了事大親日兩黨事大的黨願意靠中國親日的黨願意靠日本願意靠日本的就是那朴泳孝金玉均鄭秉夏趙義淵禹范善李柬鴻李萬來李臣孝權榮鎮那些人願意靠中國的就是閔泳翊閔泳駿寇儒臣親王李是佐李應藩諸人當日金玉均一提這議兩黨紛紛不一各人説一個道可也就拉倒啦那金玉均總是只想變法回到衙中吩咐家人道你去把朴大人鄭大人李大人他們請來家人去了不多一時他們全來到金玉均的家中讓至客廳坐下三人説道大人將卑職請來有何話講金玉均道列位不知聽我説來金玉均未從開口面帶歡尊了聲列位大人聽我言咱的國現今實是不得了居於那日本中國兩大間現如今日本盛強中國弱要靠那中國恐怕是妄然那閔氏兄弟把軍事掌他妹子又在宮中弄大權他們專專倚靠那窮中國看起來這個江山就要完伊藤博文願意讓咱們把法變他言説要沒勢力幫著咱此時中國與那法國開了戰咱趁著這個時候就當把法變先殺那閔氏兄弟哥兒倆立逼著咱皇上把新法頒別人不願意咱也不怕有那日本領事保護著咱列位大人看看這事好不好大家夥商量妥就去辦那些人齊聲拍掌説是好這才來到日本領事衙門前對著那日本領事説一遍那領事立刻與他兵二千帶領著兵馬把皇宮奔正趕那閔氏兄弟在那邊他們一見就紅了眼一個一個望上川躥鋼刀一舉忙落下最可惜一見就紅了眼當下驚動那一個驚動了親王李應藩慌忙跑到我國的公使館對著吳袁二公説一番吳提督帶領兵丁皇宮去這一回就出了亂子山亂不亂的咱不管歇歇喘喘吃代袋煙
