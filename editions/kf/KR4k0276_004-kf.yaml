body:
  text: 第九回金玉均寄書完用東學黨作亂全羅話說黃伯雄自從劍水驛病好到了平壤為李正當普通科科長後來李正又昇為全羅道的按察使伯雄也跟他去了後來打聽人說侯元首在雲府教書他捎信讓元首前來當差元首不肯來由是他二人各有安身之處光陰似箭日月如梭不覺就是六年這日伯雄在飯館吃飯看對桌三位少年講究起來了那人說今天天氣實在清咱三人好好在此飲幾杯那人說咱們只知來飲酒想一想現在國家煞啥樣形君王他日日宮中不理事將國政全都靠給那奸佞我既為高麗國中一百姓就當保護我這錦江洪況其且說人人皆有是一分子那身家財產全都在國中我今日正宜想個保國道也就算保護身家活性命若還是終日遊蕩把酒飲這國家不久的就要傾國家他好比一座高樓閣我們這數多人兒在其中一旦若柱子折了屋兒倒我們可是何處去逃生要想著保護國家無別道在於我數萬人民學問成如果是人人皆都有學問自能保國求強致太平我有心除去他那西洋教把我這東方學問興一興連聯合那數萬人心成一體好除治朝中那個狗奸雄那二人從著傍邊開言道賢弟的見識與我兩人同正是他三人對坐來講話轉過來黃海人才黃伯雄話說黃伯雄見他三人言的甚是正大遂上前問道列位高姓大名他三人見問慌忙起身答道在下姓金名有聲這位姓錢名中飽那位姓堯名在天俱是本地的人氏閣下貴姓高名伯雄答道在下姓黃名伯雄黃海道仁裡村人氏現在按察使衙門充當科長金有聲三人一齊說不知黃先生到此多有慢待望祈恕罪伯雄說諸位說的哪裡話來今日之見乃三生有幸講什麼慢待二字於是他四人坐在一處各敘了年庚有聲向伯雄說道閣下既是仁裡村人氏有一位侯元首你可認識嗎伯雄說道此人與我最相契那有個不認識呢有聲說道他現在作什麼呢伯雄說道他現在平壤府教書又把他二人逃走在外受那些顛險的事情說了一遍有聲說道那人學問最佳可惜不能見用伯雄問道閣下怎麼認的他呢有聲說道賢弟有所不知只因前幾年家君作平安道詳源府的知府上任的時候路過那仁裡村忽然染病遂找宿在元首的家中那元首與家君請醫生治病一月有餘那病體方好又將錢鈔花完元首又幫了我父子許多的盤費纔得上任那恩情至今不忘後來打聽人說他遭了官司逃走在外所以永遠也沒報上他的恩情伯雄說道既然如此咱們是一家人了說罷哈哈大笑伯雄說道方纔諸公說是想要倡興東學敝人看這個事情也很好但不知諸公怎麼倡興法有聲答道我們也沒什麼很好的方法不過是立下一個會兒招集些個國人慢慢的排斥西學而已於是他四人越說越近便又讓酒保重新煮了點酒要了點菜大家歡飲了一會當日天晚有聲付了酒錢各自回家由此你來我往我往你來一天比一天的親近遂商量著立了一個大會專研究排斥西學倡興東學那些受官吏壓迫的人漸漸歸了他們的會中數月之間就集了好幾萬人聲勢甚盛就想著要搬移政府改換國家這且不表單說日本伊藤聞聽高麗起了東學黨他就又想出壞道來命家人伊祿你去把金玉均請來伊祿去了不多一時將金玉均請來讓至屋中坐下金玉均說道大人將在下找來有何話講伊藤說賢弟不知聽我道來好一個詭計多端伊藤君你看他一團和氣喜吟吟尊了聲玉均賢弟聽我講今日有件大事對你雲只因為你國軟弱無善政那年上足下變法來維新我也從暗中將你來幫助那知道事情不成白廢費心空搭上我國兵丁人無數還搭上你那全家共滿門到後來我的兵敗回了國足下也逃在這邊來安身現如今閔家用事的全都死閣下的冤仇也算是得伸閣下的冤仇雖然招昭了雪你國家還是未能起精神我勸你現今不必把別的顧還是要整頓你國固邦根聽人說你國起了東學黨現在已經聚了好幾萬人大主意雖以興學為名目依我看反對政府是實雲我看你不如入在東學黨與他們同心共濟謀生存我國家還是幫助著你你國裡你再安上一個內應人內有應來外有救事情沒有個辨辦不真你今就去投那東學黨借著他們把勢力伸管保你能夠成大事管保你能夠建功勛我今有此一件事敢在閣下面前陳伊藤說罷一些話又聽的玉均一邊把話了話說金玉均聽罷伊藤的言語遂說我早就想著回國只因沒有因由今日聽大人一言頓開茅塞大人要果能幫助我們做事則玉均感恩不盡了伊藤說我說話那有不算之理你儘管放心大膽去做吧可有一樣你那國中能夠有內應麼玉均答道原先那朴泳孝鄭秉夏諸人皆與我相好現在那些人全都被雲在霄殺了近時與我相好的尚有一人就是那李完用聽說他在朝中也很有勢力我今先到全羅地投在東學黨中然後再與那李完用捎上一封書子他必能助我一膀臂之力伊藤說是不錯你就此前往吧於是金玉均拾道掇拾道掇坐上汽船奔全羅道而去諸明公你們想想伊藤讓金玉均借著東學黨的勢力整頓高麗國他那不是真心他是怎的呢皆因東學黨雖然人多盡是些無知的百姓必不能成大事他讓金玉均鼓動他們作亂他好乘之這個瓜分中國吞併高麗這是伊藤的意思到後來果然歸了他的道這且不表單說黃伯雄自從與金有聲等相好就結為生死弟兄他可就不回衙中辦事天天與他們倡興東學看只這邊人一天比一天隨的多後來泰仁古埠兩縣的人全都隨了也有好幾萬人就把泰仁縣地方那座完山佔了大夥公舉金有聲為督統那堯在天錢中飽黃伯雄三人皆為首領就在那造槍買馬聚草屯糧想要行大事這日他們四人正在大帳議事忽有小校來報說道外邊有人求見有聲不知是什麼人只得接出帳來將那人讓至屋中分賓主坐下有聲說道閣下家住那裡姓甚名誰到此有何公幹那人答道在下姓金名玉均漢城人氏只因前幾年在朝居官偶然變法得罪國家逃在日本近聞閣下倡興東學想要來此入夥不知閣下肯收留否有聲說道在下正愁頭目少呢閣下今日到此真乃天然幸事於是他四人也各道了姓名又推玉均為督統玉均不肯只得為了個頭目當日殺牛宰羊大排筵宴慶賀新頭領酒席前有聲向玉均說道現在咱們人馬器械也很齊整想只要行大事可得從那下手呢玉均說督統在上聽我道來金玉均未從開口面帶歡尊了聲有聲賢弟聽我言咱們的兵馬器械俱完備想只要行這大事不費難我今日所以能夠來到此全都是那伊藤博文告訴咱他言說人要想著做大事必得賴數多強大眾民權聞人說全羅起了東學黨你何不投奔他們到那邊到那裡入於他們一塊內與他們合衷共濟把任擔藉著那庶多民力來作事我管保能夠保國圖治安暗地裡我還幫著你再與你籌上道一番朝中內結下一個大臣宰與你們好把信息傳這就是裡勾外連的策本是那伊藤博文對我言這個道兒不知好不好望眾位仔細參一參金有聲說道這個計策都是很好但是這內應無人可怎麼辦呢金玉均說要是求那內應之人可就不難了金玉均復又開了聲賢弟在上洗耳聽想只要把那內應找不過是費上信一封朝中大臣李完用他與我實則有交情今日與他送上一封信讓他與咱為個內應我兩倆耐著交情重必然能夠來應成有聲說既然如此兄長快快與完用寫信吧玉均說是了金玉均提起三寸毛竹峰你看他刷刷點點寫分明上寫著拜上拜上多拜上拜上了完用李仁兄自從漢城分手後於今七載有餘零常思懷罪難回本國每於無人之處淚盈盈伊藤見我這個樣纔與我想出計一宗他命我投奔東學黨借著人家勢力好回京我今入了這東學黨為了那黨內的大首領想只要發兵把漢城進就是無人作個內應我今想把兄長來累兄長你怎麼耐難也得應成兄長今日要應許我這件事小弟我實在是感恩情金玉均寫罷這封信貼上籤兒封上了封選一個兵丁送了去他這纔回過頭來把話明話說金玉均寫完那書信封上口選了一個強兵送去遂向著金有聲說道此信而去大概能夠有聲咱們等著聽信吧有聲說道那是自然吊過了幾天那送信之人回來將回書呈上玉均一看說道事情成了有聲說道既然有了內應咱們可是從那下手呢玉均說咱們當宜先把這泰仁古埠兩縣佔了以為根基然後再往漢城進發進可以戰退可以守豈不是妙嗎有聲說道此道正好於是點齊了人馬分做五隊一人帶領一隊一隊三千人浩浩蕩蕩殺奔泰仁縣而來好一個英雄金有聲他一心要把國家興自己創下東學黨招納各處眾人丁只因為高麗國王他昏弱信任奸臣胡亂行嚴刑苛法苦待百姓天下黎民不得安寧日本又來行暴虐人民長受他的欺凌毒虐之政甚如水火百姓嗷嗷四境真苦情皇上無福民遭難這些冤枉向誰鳴無奈纔入東學黨想要借此除奸雄除盡朝中眾奸黨大家好去享太平哪知有聲主意錯想去出道來甚平庸日本本是韓國大仇寇哪可與他有私通玉均本是一賊子哪可用他為首領完用本是一奸黨哪可依他為內應一著錯了無處找有如下棋一般同作事總要思想到稀裡胡涂算不中有聲作事不思想纔創下一個大禍坑中日因此來交戰高麗因此失江洪未來之事咱不表再表表他們發大兵完山上點起人共馬忽忽啦啦往前行人馬好像一片水刺刀照的耀眼明金有聲頭裡領著隊後跟著催陣督都黃伯雄浩浩蕩蕩往前走一心要奪那座泰仁城大兵發到泰仁縣準備著殺個天崩地裂血水紅咱們說到此處住一住下回書裡再表明第十回洪啟勛兵敗古埠侯元首義說有聲話說金有聲等五人帶領人馬殺奔泰仁縣而來單說這泰仁縣的知縣姓於名澄當日正在衙中辦公忽有探馬來報說道大人哪不好了於澄說道什麼事情你這樣驚惶探馬答道大人不知只因咱這城北五十里外有座完山前幾個月有一個什麼金有聲倡興東學招集些個人佔了那山這三四個月之間不知怎麼聚了一萬多人現在攻咱城池來了離此尚有十餘裡地大人快拾道掇著跑吧再等一時他們到來咱們這城中又無預備恐怕難逃性命於澄一聽嚇的面目改色忙著拾道掇拾道掇帶著家眷投奔全州而去單說金有聲來到泰仁縣靡費事就把那座城池得了遂又商量去取那古埠縣話分兩頭單說全州的督統姓洪名啟勛這日正在府內看書忽有門役進來說道啟稟大人得知外面有泰仁縣知縣於澄求見洪啟勛說請進不多時於澄進來施禮坐下洪啟勛說賢弟有何緊事親自到此於澄說這事可了不得啦於知縣未從開口面帶慌尊了聲大人在上聽其詳有一個金氏有聲全州住他一心要把東學倡他們同夥的人兒有四個各處裡演說惑愚氓無知的百姓受他惑全都入在他的那鄉現在聲勢實在大又佔了那座完山岡三個月聚了人無數積草屯糧制造槍一心要改變那政府一心要除治那君王領著人馬把山下簡直的殺到泰仁傍本縣一聽勢不好無奈何纔到此處躲災殃望大人速速想方法不久的就要到這方洪啟勛一聽這些話嚇的他臉兒直發黃全州城沒有多少人共馬好叫我心中無主張看起來我國將來要拉倒是怎麼屢次把亂揚自從那泳孝奸賊滅除後我國裡稍稍得安康只誠想國內常常享安泰那知今日又起禍一場我們的兵馬實在不強盛怎能夠除治他們一幫事到此逼我也無有法就得拿這殘兵敗將走一場萬一要把他們打敗了也算是我國的福分強要是不能夠把他們來勝也就免不了把身亡