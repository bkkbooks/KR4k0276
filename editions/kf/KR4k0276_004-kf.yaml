你三杯酒略報報愛卿你的忠說罷將酒遞過來伊藤侯施禮謝罪接手中三拜酒方纔飲到胸膛內又過來文武百官眾公卿每人敬了三杯酒那伊藤飲的滿面紅對著百官們施下禮說道是有勞諸公好心誠施禮已畢把車上威威烈烈起了程前行來到海沿上坐上輪船奔韓行書要簡捷方為妙離留囉嗦困明公這日來到韓城那領事接在使館中話說伊藤這日到了漢城他國的領事跟到高麗國的臣宰一齊接到十里長亭大家見了面道了些個辛苦然後在進了他國領事衙門高麗的臣宰們在那談了一會遂辭別伊藤回府而去單說伊藤在他那領事衙門住了幾日說把他的領事打咐回國在高麗一概的事情全都歸於他一人辦理這一日下了幾個請帖把高麗國的大臣李完用趙丙稷朴定陽尹用求等請來讓至客廳分賓主坐下侍人過來倒上茶茶罷擱盞李完用等問道貴大臣今日將我等招來有何事相商呢伊藤答道靡有別的事情只因我國上幾年替你們平定東學黨你國的民無故的把我的兵丁傷了無數我國就想要替你國改革內政趕上與中國開仗也靡得暇來辦此事今年因為我皇上派我為你國的統監連保護商務代辦那一年的事情我以為那年的事情雖是你國的百姓無禮我們就硬把你國的政治改革了也是很對不起貴國的所以我今天將貴大臣們請來有幾樣事情相商不知諸公願聞否李完用等說道統監只管說來我們無有不願聞之理伊藤說如此諸公聽我道來伊藤侯坐在椅上把口張尊了聲列位大人聽其詳只因為你國人民來作亂我國的無數兵丁受了傷這都是你國內治不完善纔惹出無數人民發了狂我皇上就把你們內政改派我為你國統監在這方我今日要把你們政治改又覺著貴國臉上沒有光敝人我想出一條完善道敢在諸公面前陳短長你高麗所以到這般軟弱都因為你們內政甚不良我國家兵強馬壯政治好可以替你們保護錦家邦各衙門要上我國人一個各樣事全得跟他去商量有不善他們就能與你改我管保諸般政事皆見強各國裡你們不用把領事駐不用的領事在此讓他歸故鄉外交事全能替你們去辦一文錢不勞貴國費思量省下錢再與你國興武備管保使你們韓國不滅亡從今後你國歸為我保護別的國誰也不敢來遭殃改好了我們就推開手豈不是一舉兩得一好方這伊藤花言巧語說一套哄的那高麗臣等無主張齊說道這個相香應多麼大咱快去稟報於那李熙皇話說李完用被伊藤一片言語哄的心眼直轉說道貴國既有這片好心來保護我們的國家我們真是感恩不盡了我們就回去稟於我國皇上得知然後統監望我們各部裡派人吧豈不是好麼伊藤說既然如此諸君就去稟報於你們國王上得知吧於是李完用等出了領事衙門來到金殿見了韓皇把伊藤的話一學又說伊藤怎樣好心人家替咱們保護國家改變咱國的政治改革好了人家就撤手我主你看這事有多麼相香應今日若不依允恐怕過了這個村靡有這個店啦那李熙本是胡哩胡嘟任其事不知的一個皇上當日聽大臣們這一說也尋思這事是好事遂說道愛卿你們酌量之辦去吧於是他們又回到日本領事衙門把方纔之事對伊藤一說伊藤說你們皇上到算是好王於是命野軍鎮雄為韓國兵部顧問官藤增雄為內宮學農工三部顧問官賀田種太郎為財政局的顧問官幣原坦為學部參與官九山重俊為警察顧問官三島奇峰為法部顧問官又將韓國各處人民詢訟的事全讓他們領事代管當日伊藤分派已定是日韓國行政的權力全歸於日本人的手那韓國原有的官員僅僅的跟人家一塊吃飯湊熱鬧而已而韓國的君臣還以為日本是好意真是可嘆哪好一個詭計多端伊藤公行出事全是要把高麗坑拿著那保護韓國把名買暗地裡奪取利權在手中韓國裡君臣無謀見識小整天的稀裡糊塗賽啞聾日本人施下毒辣傷人手正以為人家給他好相香應自己國自己就當能保護斷不可倚靠外人把事行自己事全讓人家來替辦簡直的跟著滅亡一般同有權力國家就算有靡權力國家既算扔權力他是一個甚麼物列位不知聽我明權力與人好比一杆秤用他來把東西衡力者就是咱們的力那權兒就是秤錘他的名有秤錘就是打物件靡秤錘就是不能行咱們人好比一秤杆倚靠著秤錘把物衡秤錘要是歸了外人手這杆秤就是無用人一宗政治就是國家權力能得權力國必興高麗把權力送與日本手無怪乎他就扔了錦江紅洪中國人全不知他權力保也恐怕跟著高麗把國扔勸大家千萬要把權力強斷不可忽忽悠悠度秋冬這一回高麗失權真可嘆下一迴日本把我財政清書說此處算拉倒明天白日再來聽
