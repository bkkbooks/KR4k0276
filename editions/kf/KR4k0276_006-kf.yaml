慌忙下了客車中走向上與各官員把禮見說道是有勞列位來接應他這裡正與各官把話講未提防人群鑽出一後生手中裡拿出七響槍一杆對準了伊藤博文就行凶忽聽的嗑叉嗑叉響七下只見那伊藤倒在地川平川上君右膀一以上把傷受小池君左腿一以上冒鮮紅俄國兵見事不祥圍上去捉住了重根刺客不肯放鬆刺客他大喊三聲韓國萬歲眾兵丁將他送到衙門中中日人看見伊藤倒在地急慌忙上前扶起驗身形但只見前胸打進兩彈子渾身上血星點點令人驚吩咐人急刻抬至領事館請來了日俄兩國大醫生眾醫生方纔來至領事館那伊藤已竟嗚呼歸陰城他亡年正在六十零九歲也算是亞洲多智大英雄都只為他的心腸太毒狠所以纔忠烈俠義不能容再不能統監外國弄譎計再不能暴虐韓民不太平這一回路途之中被了刺也算是為國為民喪殘生領事官無奈含悲先成殮然後的一封電奏到東京將刺客打在木籠囚車內跟靈車一同送到奉天城將伊藤棺槨送回本國去將刺客送在旅順審判廳審判官坐在上邊開聲問叫一聲行刺之人你是聽我問你因為甚麼來行刺重根說替我國家報冤恆我今日事已作成遂心志但願之早早賜我歸陰城審判官再三鞫訊無別供擬下個抵償之罪梟首刑法場上含笑就刑真傑士就死後神色不變面如生這纔算韓國英雄第一位落下個名標青史永無窮咱這裡壓下此事且不表再把那本良三人明一明話說他三人見重根那時刺了伊藤喜出望外打聽解送旅順拋了藥鋪後趕而去候著重根斬訖夜間盜屍成殮送回平壤會上一見又悲又喜喜的是伊藤已死悲的是重根已亡他大家哭奠一番擇地安葬養其老小而已論伊藤是謀臣不足為忠專務競吞不行仁義不思守國安民只想奪地戕生有詩嘆曰弱國強吞事可傷吊君何必苦爭忙只因貪戾行欺詐功未成時身滅亡又日暴虐從來不久存秦吞六國漢平秦只興有道伐無道好惡拂人災及身又贊美安重根詩曰報國雄心盈宇宙忠君正氣貫韓京於今皜月臨皜骨普照千秋仰大名話說李相佔內等葬安重根回到會上去了單說伊藤的棺槨回到東京日皇帥率領滿朝文武官接出十里之外到了家中發喪已畢埋葬起來封其子文吉襲男爵光陰似箭日月如梭不知不覺的又過了新年那一年就是宣統二年宣統二年春天日本將韓國統監曾禰荒助換回派寺內正毅前去作統監這一日韓國忽然起了一個大暴動要問這個暴動是甚麼且聽下回分解第二十五回李完用賣國求榮金洪疇兵敗逃走上回書說韓國起了一個大暴動這個暴動是甚麼呢列位有所不知只因韓國統監寺內到韓國時也是日日想法將韓國滅了這日忽然想出一個道來自己說道韓國君臣無道那百姓又全然不一個心反對他們政府的很多我今日何不上他那政府商量著將日本韓國合在一處名曰一國假說替他們保全自安的名目以籠絡他那君臣也不敢不從就是這個主意遂坐上車到了韓國政府門外下車早有人報於李完用等李完用等聽說慌忙接出堂來讓至客廳分賓主坐下使人獻上茶來吃茶已畢完用向寺內說道統監無事不能到此今日到此有何軍國大事相說呢寺內說我今日到此所辦的事情可真不小但是與你國也很有利益諸公不知聽我道來這寺內坐在那邊開了腔尊一聲列位大人聽其詳你國家政治頹靡民氣弱全仗著我國與你作主張是政治全得歸於我們管我國人費了多少苦心腸為你國我國化了多少款替你國安排政治保家邦你的國現今不算獨立國別的國待你韓人太不良咱兩國不如合併在一處是政治全都推於我皇上我皇上替你國人把事理你皇上安然無事把福享從今後我國人民高聲價從今後你國君臣得安康光在那高樓以內享清福什麼事不用你們作主張過這村恐怕沒有這個店這本是保全你國第一方諸公們看看此事可不可要可行條約之事再商量寺內他說罷合併一些話又聽的完用那邊訴短長完用說這個事情倒很好我心中早已量過這一樁我國人常常埋怨我大夥說我們不會辦事竟遭殃外面的名聲實在不堪講早晚的就要來把我們傷奸臣名反正我們算被上倒不如跟著你國合了邦寺內說這事果然要辦妥我管保諸公永久在廟堂我管保俸祿銀子不能少我一定不能撒謊把人誑完用說這個事情全在我皇統監不必常常掛心上說罷了寺內告辭回衙去李完用急忙上殿見韓王山呼畢交椅以上落了坐把那事對著韓皇奏其詳高麗王一聽合併這句話嚇的他不由一陣心落慌話說完用上了金殿將合併之事對韓皇講了一遍極誇講合併如何之好咱這國如此軟弱終久不能強啦不如趁著這個時候跟日本合成一國比啥都強韓皇說事出倉卒我也無有章程你等幾天看看百姓如何李完用聽韓王之話只得下殿回府這且不表單說漢城裡有一人姓李名喚容九在漢城中創了一個一進會入會者也有三十餘萬人他立這會是為甚麼呢其中有一個原故韓國歸日本保護在萬國公會上他的國列為四等國他的百姓也就列為四等民了這李容九創會的意思是想要使韓國人為一等國民當日聽說日韓合邦這個事情心中想道日本是一等國我國要是與他合成一處我們豈不是也成了一等國民了嗎這個事情當以竭力贊成遂率領會中三十餘萬人在政府中遞了一件意見書呈說日韓合邦有多大好處又各處勸化說是咱們要跟日本合在一處咱們百姓就全成了一等國民了別的國也能高抬咱們那韓國百姓皆信以為然遂同上意見書於政府贊成日韓合邦之事李完用見有好幾十萬民上意見書遂又奏於韓皇韓皇想著不應吧百姓們願意的很多大臣們全部願意日本人又逼的利害無奈將此事應了日本明治四十三年八月二十二日日本統監韓國寺內正毅韓國內閣總理大臣李完用在總督府寫了條約凡是韓國的政事全歸日本去了韓國國號封韓國皇上為昌德公李王永遠不許辦韓國政事條約擬成二十九日發佈韓國從此可就亡了都只為李氏完用狗奸佞倒賣了高麗國的錦江洪日本官發出合邦一意見完用他以為好事就應從將政治全都讓於日本管自古來無有這樣事一宗明只說日韓合邦是好事暗只說日本實在得相香應是權力全都歸他政府內是土地全部在他掌握中去了那大韓國號兩個字高麗王簡直變作一白丁既說是日韓合邦求安泰為甚麼隆熙受那日本封這事情令人實在測不透他君臣怎麼全為糊塗蟲尤可恨昏庸首領李容九立一會創成亡國第一功他想要仗人勢力增多價這件事好比畫餅把飢充他兩家合併條約一發佈驚動了愛國會上眾英雄調察員打聽明白這件事忙到了愛國會上把信通對著那相佔內諸人說一遍到倒把那眾位英雄眼氣紅一個個手指漢城高聲罵大罵聲李氏完用狗娘生你也是高麗國中人一個你也有父呀妻子弟與兄滅了國你也未必得了好你為何暗助日本把事行奸賊呀有著一日獲住你我大家生吃你肉不嫌腥眾英雄越說越惱越有氣一個個摩拳擦掌要行凶齊說道國家已經滅亡了咱何不豁上死命爭一爭他大家聲聲要把日本打金洪疇口尊列位且稍停話說愛國會諸位英雄聽說日韓合併就要前去與日本作對金洪疇說咱們大家且不要性急咱們要反對此事就咱這二十九人不能中用必得去到各處調齊了鄉團連聯合著百姓作起事來見一個日本人殺一個然後再上漢城去殺統監寺內與那奸臣李完用要是將此二人除治再破出死力與那日本人作對或者能將咱們國家保住現雲老大人在霄已經於去年病故別的臣宰皆是奸貪要辦此事非連聯合百姓不可了李范允道此說甚好事不宜遲咱們就如此辦去吧金有聲說好他大夥遂到了各處連聯合百姓們那百姓們一聽著這個動靜全都說要破出死命去打日本不幾天工夫就連聯合了四五十萬人馬男男女女槍也摩沒有多少隊伍也整齊不了但是愛國血心氣象勇猛數日之間人馬齊備公推金洪疇為元帥他也不推辭遂將兵隊點齊令李相佔內等各領兩萬人浩浩蕩蕩可就殺起來了忽聽得日韓合邦事一宗氣壞了愛國會上眾英雄連聯合了四五十萬戶百姓金洪疇眾人公推作元戎眾英雄每人帶領兩萬俱都是男女老弱不相同雪恥會頭領名叫劉福慶率領著苦力農人作先行復仇會週二娘子李三姐帶領著仗義婦女隨後行雖然是槍械子藥不完備各懷著救國忠誠氣象凶遇見了日本一個殺一個不論他男女老少與官兵金洪疇領兵殺奔漢城去一路上遇著日本不容情殺死那日本官員無其數驚動統監寺內那計多星與他國打去一封急電報立時的發來三鎮大陸兵日本兵一齊發到高麗界朝日嶺兩軍相拒紮下營下戰書第明清晨開了仗只聽的連環大炮響咕咚韓國兵大半是些農莊漢又加上軍裝火藥不相應日本兵使出落地開花炮眾義兵何能抵擋大炮轟隔大山兩軍打了一晝夜韓營裡周莊本良傾了生寇本峰李俊高雲相繼死又傷了孫子奇與雲落峰還有聖思聖暇合著蕭鑒又傷了李樹蕭與李緯鍾雲在岫堯在天皆被槍打金有聲錢中飽皆受炮轟李范允小曹純二人廢命又死了黃伯雄韓氏弟兄吳佐車與侯珍爭先而喪週二娘李三姐為國捐生雪恥會故去老將劉福慶傷兵丁四散逃亡數不清往往是兵家勝敗為常事最可憐韓國被傷人苦情雖然是為國亡身死的苦照比著賣國求榮死猶生只因他人雖忠勇器不利因此纔打了敗仗落下風愛國會兵敗將亡失散淨只剩下相佔內洪疇人二名他二人獨立無援方逃走撲奔那南洋群島去避兵在路上哭聲我國眾男女又哭聲忠君愛國的眾賓朋高麗國於今算是要亡滅咱無有回天手段怎成功只指望旗開得勝復韓國不料想竹籃打水一場空最可嘆無數良民白送命那去了同心聚義好英雄再不能立會結團扶家國再不能宣講自治化群生他二人哀國哀家哀百姓英雄淚滴滴點點濕前胸止不住一行哭著一行走此一時四方墜落太陽星意忙忙投奔招商存旅店咱在此休息一夜再登程我也要說到此處留連住勸諸公果知感激再來聽
