body:
  text: 第二十三回安志士歸國吊恩師雲在岫義倡愛國會話說雲大人這日正在書房觀書只見家人呈上一封信來他接過來一看外皮上寫著是從美國來的遂啟了封簽從頭至尾可就看起來了上寫著叩稟父母尊前聽敬稟者孩兒名喚雲落峰願父母膝下金安身康健願父母福祉多綏神氣清孩兒我於今離家五六載在外邊每思父母淚盈盈上二年本良回家捎過信趕以後永遠未捎信一封現如今我們全都畢了業安重根榜上列了第一名我大伙畢業全是最優等昨日裡領了畢業大文憑不久的就要束裝回家轉過不去三月就能到家中望爹娘不要苦苦把兒盼咱居們家不久就能得相逢右寫著闔家老幼均安泰左寫著愚兒落峰燈下沖匆雲大人看罷落峰來的信你看他急急忙忙後宅行話說雲在霄看完了書信急忙上了後宅見了老夫人跟安母說道咱們那些游學生不久要家來了安母急忙問道有信怎的在霄遂將落峰信中之話以一學安母說道我兒今日可有還家之信了又聽畢業考的第一把個安母樂的無所措手足了那雲老夫人說妹妹從今後別念誦你那重根長重根短了安母說不但是我就是嫂嫂你也不必念誦盼望你那落峰兒了大家談笑了一氣就專專等他們還家這且不表單說金有聲李相佔內諸人畢了業領了文憑呆了幾天大夥全收拾了一齊僱上火車回家趕到海岸又上了火船飢餐渴飲非只一日這日到了仁川一齊下了船僱了幾輛馬車將東西搬在車上李相佔內對著大眾說道咱們大家到家可千萬要在社會上作事斷不可貪圖富貴把游學的目的扔在一邊大家一齊說道兄長不必多勞我們斷不能廣希富貴忘了國家李相佔內說既然如此咱們就此分手了吧於是各上了車子而去單說安重根雲落峰幾人坐上車子夜宿曉行不日到了平壤各回各家重根等到了雲府全家相見歡天喜地談了些一路的景況說了些美國的政治這時候趙適中孫子奇聽說他們回來也前來相瞧大家會在一處談了一會侯珍說我叔父跟寇老兄往那裡去了雲蔣峰安重根也說道可是怎麼不見他幾人呢孫子奇說要問他幾人你們不要急躁聽我慢慢的道來孫子奇未從開口帶悲容尊了聲你們三位聽分明咱高麗歸那日本國保護那伊藤在咱國中統監昇用巧言買動咱國大元老將權力全都奪在他手中這權力一歸伊藤不要緊最可嘆咱國人民受苦情他行出別樣壞事還可忍青天白日姦淫婦女實難容那一年岳公妻妹把親串又見了日本賊人來行凶他妻妹因為這個喪了命趕到那岳公回來眼氣紅又加上咱國權力歸日本纔惹起他那心機火一重寇本良與他做子了三炸彈一心要刺那統監名伊藤到後來伊藤來此把事辦岳公他埋伏在這南門東該著那伊藤老賊命不盡炸彈子未曾傷著他身形岳公他身被炸彈活崩死落了個冤仇未報喪殘生他三人一聽這個話齊說道我說岳公他怎麼未來原來如此真是可惜那炸子怎麼就靡崩著那伊藤呢真是使人遺恨咱們游學的二十餘人未等作事先傷了一位真是讓人傷心落淚呀雲落峰說岳公既然如此我那本良哥哥與咱們先生他二人可是那裡去了呢孫子奇說你不要急躁聽我一句的一句的道來孫子奇復又開言把話明你三人不要急躁仔細聽咱先生在這城中開報館各處裡勸化百姓有大功也不知何人對那伊藤講說先生他是岳公黨一名又說那炸彈原是本良造遂派了十數個兒巡警兵上雲府來就把他二人找這時候有人到此把信通他二人出離北門去逃難後有那無數巡警把他攻一槍兒將咱先生活打死寇本良逃難不知奔何程他三人一聽元首喪了命一個個跺足捶胸放悲聲這一個哭聲叔父未見面那一個哭聲義父不相逢這個說我兄不知何處去最可嘆先生一命歸陰城一齊的指著漢城潑口罵伊藤呀害的我國好苦情為什麼我國權力你奪去為什麼讓你國人來行凶為什麼姦淫我國好婦女為什麼監理財政警權爭種種的行凶作惡真可恨我高麗將久坑於你手中重根說我父母當年受了日本害侯珍說不著那個我們那能外邊行看起來這個冤仇何日了倒不如尋找伊藤把命拼他三人哭一氣來罵一氣淚珠兒點點滴滴濕前胸雲夫人見他三人哭過甚他這纔走上前來勸一聲話說他三人越哭越痛雲夫人急忙上前勸道你三人不要哭了元首已經死了哭也無益不如養養你們的神思想個方法保全咱這國家與元首報仇要緊他三人被雲大人勸了一會這纔不哭侯珍又向子奇問道我叔父既被巡警打死後來怎樣呢子奇遂將伊藤怎麼邀買人心雲大人怎麼接來埋葬於何處對他學了一遍重根說先生既死帶咱們這些情算是無以報了明日預備下點祭禮上他的墳墓上哭吊哭吊盡盡咱們心不好嗎落峰等說那怎不好呢於是大家又說了些國家事情遂各自散去到了次日安重根雲落峰侯珍雲氏叔侄一共五人拿了點祭禮帶了一個家人到在元首墳上一看孤墳三尺荒草四圍心中甚是悲慘重根急命家人擺上祭禮他五人一齊點香行禮坐在地下可就哭起來了眾英雄點香已畢坐在塵一個個兩眼撲簌滾淚痕哭了聲元首恩師死的苦白瞎你一腔熱血滿腹經綸前幾年尚在平壤開報館至而今身歸黃土起孤墳你的那扶國雄心不能展落了個西風飄飄蕩孤魂與國家未能立功身先死豈不是黃泉遺恨百年存師傅呀你死一身只顧你讓我們往後作事靠何人侯珍說叔父待我恩情重從小裡時時保護我的身只誠曾想回國團圓把叔奉那知道叔父一命歸陰城看起來苦命之人誰像你尋思起真是讓人痛傷心重根說師傅於我恩更重提起來實在不能報一分奇峰山救過我們母子命念書時教我費心格外深在美國僅僅呆了五六載師傅呀你怎麼不等我報報恩看起來師傅你死非為別的都是那賊子統監伊藤博文伊藤賊與我冤仇深似海我必然除去老賊把冤伸那邊鄉在岫落峰號陶哭雲落峰眼淚滴滴濕衣襟正是他五人哭元首又只見遠遠來了四位人話說安重根等五人正是在那裡痛哭元首只見遠遠來了四人走至近前一看乃是金有聲黃伯雄堯在天錢中飽四人他四人一齊說道你們來怎麼不與我四人一個知會呢說完了遂也坐在那裡痛哭一場哭完了一齊站起撮嘆息一會這纔一齊轉回家中呆了兩天這一天有孫子奇趙適中蕭鑒三人前來造訪雲在岫接至屋中坐下在岫說正想要請你幾人去呢孫子奇說請我們作甚麼在岫說你們不知道現在咱們已經回國這些日了也得想著作點事纔好呢孫子奇說兄長有何高見請當面言講要是好咱們就張羅去辦豈不好嗎在岫說既然如此聽我道來雲在岫未從開口喜洋洋尊了聲列位兄弟聽其詳咱大家美國留學五六載今年裡纔得畢業轉家鄉現如今到家已經數十日還得要謀方畫策保家邦咱大家要是不去把力用這個國不久就要見滅亡想當初咱們說過開民智今日裡還得去從那個方咱國中人民已有數百萬要去作也非容易事一樁我想要在這城中立下會請咱那諸位同學到這鄉大家夥同心努力把事辦立下個愛國大會在平壤在會中人人盡把責任負勸化咱各處人民保家邦全國人要是全存愛國意咱這國或者不至被人亡這主意你們看看可不可要可行就此撒帖往各方將咱那同學之人全請到在會人各盡責任化愚氓他幾人一齊說道甚好咱們就各處撒帖聘賢良在岫說此道既然能行這會場可得安在何處呢金有聲說道可也是呀這個會所准得找個僻靜處纔好呢孫子奇說那先不忙等把他們請來再作定奪吧在岫說是對於是就寫了些個帖子望各方撒起來了好一個雲氏在岫小英雄他一心要倡愛國會一宗四方裡撒的帖子無其數要請那游學美國眾賓朋劍水驛來了陳氏兄哥倆在漢城來了李樹蕭合和李緯鍾李相佔內李俊也來到還有那李范允周莊曹存人三名咸境漢城的英雄全來到又來了平安北道眾英雄金洪疇高雲便在頭裡走後跟著述堅述白二弟兄吳佐車騎著快馬也來到一齊的進了平壤這座城他諸人一齊到了雲府外雲在岫慌忙讓至待客廳大廳裡分罷賓主落下坐書童兒獻上幾個小茶盅主賓茶罷把話講說了些多日不見相思情相佔內說怎麼不見本良寇賢弟范允說岳公賢弟何處行雲在岫見他二人把話問遂把那上項之事說分明眾英雄聽說岳公喪了命一個個手指漢城罵伊藤齊說道破壞我國都是你趕何時將這老賊性命坑替我國黎民百姓出出氣替我那屈死朋友報冤橫咱大夥趕緊立這愛國會成立時好去刺這老賊丁有聲說你們大家別急躁咱還得張羅立會是正經話說李相佔內等正然痛罵伊藤金有聲說你們不要如此急躁咱還得是張羅著立這會纔是呢雲在岫說現在咱們人一共有二十六位了要想只辦方纔所說那件事准得在僻靜處立會纔好有聲說何妨差人去上外邊訪聽一個僻處呢在岫說這也倒不錯遂差孫子奇雲落峰去上外邊訪聽地方二人去了兩天回來說道我二人出去訪察地方事情也湊巧離此三十餘裡就訪察著了那處名叫留雲浦西面有一山名叫落雁山在那山傍有一座房甚是僻靜這房是留雲浦劉福慶的我二人見了劉福慶一提那劉老爺情願讓咱們白住你們看這事豈不是好嗎在岫說既然有了會所咱們就搬在那裡去吧大家說是好這纔一齊搬到那裡把那愛國會立妥舉李相佔內為正會長金洪疇李范允二人副之其他皆為會員會既成立各任責任安重根侯珍雲落峰情願去刺伊藤堯在天雲在岫蕭鑒吳佐車四人管四路調察打聽消息事韓氏兄弟陳氏兄弟曹存李俊六人管倡辦鄉團事錢中飽黃伯雄李瑋鍾李樹蕭雲落峰五人管各處宣講自治事金有聲堯在天跟三位會長管開報館事趙適中高雲孫子奇周在四人管製造物品勸化人民講求實業事當日眾英雄各有責任調查員又連聯合了復仇會及雪恥會由是平壤地界的人民讓眾英雄們勸化的很好專等打聽伊藤出行的消息好去行刺這且不表單說韓國這個時候李熙皇帝讓位給太子隆熙封李完用為內閣總理大臣伊藤一看韓國換了皇上李完用當朝他就看出韓國不能興行了可就想起瓜分中國的事情了遂辭了統監之職以曾禰荒助為統監自己坐船歸國仍在朝當宰相這日日皇昇殿伊藤出班奏本正是經營朝鮮還未已又來中國起風波畢竟不知伊藤說出甚麼話來且聽下回分解第二十四回安志士中途逢故友伊相國哈埠受凶災話說伊藤上至金殿山呼已畢日皇設下一把金交椅命伊藤坐下伊藤謝恩坐於交椅以上日皇說道愛卿歸國未發一策今日上得殿來有何本奏伊藤說老臣一日不死不敢一日忘了國家今日上殿還是為的國家大事我主在上洗耳聽微臣道來伊藤侯未從開口笑吟吟尊了聲我主在上聽原因臣本是西京一個讀書子無甚麼經濟才幹在本身蒙見愛召進京城作臣宰臣自愧無甚學問佐聖君因此纔歐美諸邦去遊歷擔耽誤了十餘年的好光陰回朝來籌備立憲謀變法全國裡君臣上下煥然新都只為我主待臣恩情厚臣這纔竭盡愚忠報聖君為高麗為臣廢費了千條計好容易奪他權力買他心十年上韓國政府咱買透那塊地將來不久歸咱們從今後不用在那把心費費心機善是把中國去瓜分中國人比著高麗強百倍細思想不是容易就瓜分臣有心南北滿洲去遊歷看一看他那人民啥樣心訪一訪諸般政治好不好探一探官吏因循不因循考一