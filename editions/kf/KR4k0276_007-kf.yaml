body:
  text: 第二十六回既合併英雄徒落淚未瓜分國事宜關心話表金洪疇李相佔內二人入店焦思一夜第明清晨急速登程夜住曉行非止一日單說這日到了南洋群島想著由那上火船投奔美國去借兵復仇偏趕上這檳榔嶼地方有他們高麗人很多在那立下一個同鄉大會當日金洪疇二人入到會中見了那會中的會長賀平康平康將他們讓至屋中各人通了姓名平康問你們二公為何到此洪疇遂將韓國的現在情形怎樣的合併他們與日本怎麼爭戰怎麼敗的對會長細細的說了一遍平康說我也聽說不想這事已經成了咱們算是亡國人啦一陣傷心懷國俱各哭起來了賀平康聽說合邦事一番他這纔哭聲韓國叫聲天我高麗立國於今幾千歲不料想一旦亡在日本前日本哪你國待鄰特暴虐這幾的我們甚可憐明只說保護我國成獨立暗設計奪去我主政治權既說是替我韓民求幸福為甚麼不許我主掌國權他不是詭計詐謀行僥幸辦交涉不得相香應心不甘上幾年假說保全高麗國平空裡安上不少顧問官統監府修在我們京城內凡事情全得歸於他統監那時候伊藤巧言來虛哄他說是改好政治皆回還這政治已經改了四五裁恨煞人今日生出大事端顧問官不但不去又多設硬奪了我國政治巡警權奪去了諸般大權猶不足又要奪錢糧土地與江山說合併明明吞滅我們國是舉動我已早就聽人言日本人說話靡有一回算一轉眼就要弄出巧機關合邦本是定的併吞計事已成令人聽說心痛酸最可恨賣國奸賊李完用你不該倒賣韓國錦江山你也是父生母養本國後為甚麼作來起事來無心肝論官職你在咱朝頭一個是凡那千斤重任你得擔正應該日夜暇思求善策保全著國家不亡纔算賢不能夠保國安民宜求退你反與他國私通失主權你一時貪心不足國榮利賺下個萬世千秋罵名傳從此後今生結下來生怒從此後不殺奸賊心不甘又罵聲不知好歹李容九你為何贊成合邦事一端你累世韓國生來韓國長國要亡你的身家怎保全像你這豬狗無知為會首作壞事理宜扒皮把眼剜咱本是箕子之後文物國至而今扔的不值半文錢從今後家業財產歸人管從今後父母妻子不團圓從今後身與子孫當奴隸從今後子弟不許讀書篇使喚咱任啥不懂成呆子使喚咱忘了根本恢復難使渾喚不知父母真名姓使喚咱韓國三字扔一邊咱的字永遠不許咱們寫還得去竊學他的字語言數年後咱國制度全灰盡縱就有天大手段是枉然這好比臨崖勒馬收韁晚這好比船到江心補漏難賀平康一派悲國思家話痛恨極淚點滾滾濕衣衫兩旁邊在會同人皆傷感俱個的淚珠點點落胸前這就是英雄才有亡國淚就是那無知人聞也心酸這洪疇心忙就要奔美國賀平康攜手送出大門前囑咐聲事事留心多謹慎暗到在美國以裡把兵搬此後事成敗爭兢難預定這部書編刻此處不再編列明公思一思來想一想亡國的形狀悲哀太不堪高麗國先侵後滅誰不曉皆因那忠烈英傑不得權病作成無有靈丹難續命勢已去雖有智者怎保全細思量都是庸愚他誤國致使那愛國英雄喪九泉未死的追古悲今空流淚有何法能使我國不來完眾英雄淚落千行無濟事勸君子可知防患於未然眾明公思思高麗想想己咱中國現在亦是難保全咱中國誠恐先亡東三省這吉奉如在人家手掌間日本人得隴望蜀非一日因為這高麗奉吉緊相連那朝鮮本是東省屏藩地好比似一座院牆修外邊有院牆狼豺不敢把院進無院牆狼豺進院有何難現如今狼豺已經要進院望諸公快想妙法將他攔趁此時安排器械不甚晚遲誤了狼豺要將翅膀添待等他添上翅膀恐靡治那時節也與朝鮮一樣般滅咱國就是把咱家來滅別拿著家國二字兩樣看失了國分崩離析家何在大家的仔仔細細想一番可知道愛國愛家一樣愛不保國一定不能保家園咱中華君臣人民稱大國無上下人人都當求治安休仗著朝有君相能推靠千斤擔還是大家一齊擔官府裡那樣不是靠百姓壞了事選情得百姓受熬煎明良宰光知修己安百姓胡蠢蟲光知賣法摟官錢豈不想將來要坑咱大夥為甚麼你們還想去靠官滅了國他們還想享新福受苦罪咱們百姓得佔先看一看這個時候難挽救家府家以為無事在心間那拿著那國計民生不在意每日夜妓女窩窯子去的歡將私財揣在私囊無其數世界亂好上外洋去過年動不動就說款項不夠用修衙署為何浪費那些錢行新政何必高樓與大廈種種的虛糜耗費不堪言不管那野有餓殍民凍餓只顧的車來轎去吃喝玩並不想美酒膏粱萬民血並不想日費虛耗百姓錢一出門前呼後擁人不少這個樣實在令人不喜歡帶護兵為的防備革命黨這個話又無滋味又無鹽革命黨刺的賊官與污吏為什麼不作清廉忠正官皆因為誰作廉官誰不久亦只因同流合污去敷衍大家們從今不必靠官府到何時也得百姓去當先大家們要不想法救東省怕的是事到臨頭後悔難東三省好似齒牙在口內朝鮮國好似嘴脣在外邊嘴脣子倘要被人割去了齒牙兒突突露外受風寒要想著齒牙不把風寒受除非是另設法子保護嚴我今天沒有別的救急法各處裡齊心用力練鄉團莫疼錢備下槍炮與藥彈欺壓來當時咱們把臉翻大家夥至死不退將他打東三省尚可一戰得保全謹記著自治自強結團體謹記著別把此事扔一邊愁無奈午夢窗前弄紙筆為勸懲編出韓亡事一番這部書編到這算完了列位看書的爺們與聽書爺們總要把高麗亡跟咱東三省的關係常常在心中存著那伊藤很有奸智創出歸併高麗瓜分中國這兩條大事吞併韓國那件事他算辦成啦至於瓜分中國這件事還得在我們中國人嘍怎說在我中國人呢這話有個緣故哇一者人多地廣二者比高麗開化三者現時奪去權力不多我們要存個自強的心思外國雖想只來瓜分他們也得打算打算要是咱們大家真能自強國家也就強盛啦他們也就不敢來瓜分了列位想想咱們可是讓外國瓜分哪可是人人圖自強呢這話我也不敢說定了那位說啦外國要把咱國分了咱們分到那個就與那國納糧納稅那裡有甚麼不好呢咳列位不知現在這個時候不相像早頭了早頭是滅國現時是滅種甚麼叫作滅種呢就是把這種人的風俗人情言語文字官階服制倫常禮義全都去掉讓你與他國人一個樣子他還不能好好待你拿你當牛當馬作奴作隸是凡不好的事情全讓你去作把你一家人指使個七零五散父子不相見兄弟妻子離散台灣就是明鑒你們看看國事悲那部書看俄國待波蘭民那個樣子別的國也就全是那樣子這個事情就在我們當國民的關心不關心了話說到這就算完書編到這要算完至於咱們國完不完上下同體方保全嗟呼到此我也不忍說了我也不必說了我也不敢說了我也不能說了該拉倒吧詩曰中原自古產英雄痛恨今朝盡醉翁禹域軒裔悲欲滅權人急轉夢途中又曰興廢雖然在國民提綱挈領賴賢臣仍依敷衍因循計難免臨危血濺身又曰忠貞萬古水流芳何自偏私亂紀綱歷史奸貪傾國輩榮華莫久臭名長又曰紂時億萬心億萬周有三千惟一心上猶疾風下弱草自強何以只責民又曰於戲大局將支離仰賴忠謀挽救時上下開通無障礙民情猶水任東西
