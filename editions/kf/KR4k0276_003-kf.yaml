body:
  text: 第八回雲在霄首誅袒日黨金有聲始倡興東學從來奸臣賊子大抵不能久長欺君犯上害忠良皇天那能見諒說起韓國臣宰盡是些個奸黨在霄發兵到那鄉個個全把命喪西江月罷書歸上回上回說的是那侯元首說出姓名雲在霄聽說他是侯元首急忙跑到後堂見了安太太說道妹妹常念誦你那恩人長恩人短今日你那恩人來到咱家了太太說是那侯元首嗎大人說道正是太太說道現在那裡大人答道現在書房呢太太說道你快領我去見他於是他二人到了書房太太一見元首在那邊坐著衣裳襤縷太太上前跪施禮說道恩人到此有所不知望祈恕罪元首愕然不知所為忙說太太錯認了人啦我與你有何恩太太說道恩人忘了奇峰山日本人劫道的事了嗎元首忽然想起說道你就是安太太嗎安太太說道正是安太太又問道恩人怎麼到此元首說太太要問我怎麼到此真是讓人一言難盡了侯元首未從開口帶悲容尊了聲太太在上聽分明只因為那年我把日本打傷了他們賊徒好幾名日本人因此懷下不良意一言要害我的活性命黃海道交涉衙門把我告他說我搶奪財物來行凶任忠賊准了他的狀派公差拿我元首把命頂多虧了黃氏伯雄把信送我這纔帶領侄兒躲災星伯雄他表叔在此作提法我三人帶著財物這邊行那日到了劍水驛我們三人宿店中該著是我們三人命不好那伯雄劍水驛上染病癥伯雄他一病病了一年整將銀錢花了一個淨打空行李馬匹全賣淨我又在長街賣字為營生賣字遇見陳月李他命我到他家中教兒童因此我劍水驛上把館設將伯雄接到我學房中到後來伯雄病好平壤去我叔侄就流落在劍水城教書到了一年整又見了學生名張英偷盜東西被我打吃了毒藥歸陰城張家因此將我告我這纔受罪牢在獄中陳月李上下與我來打點纔將我搭救出火坑各學生每人幫我錢十吊我叔侄纔能往這邊行上月到了這城內聞人說提法李正把官昇李正陞官全罷去我叔侄又撲了一個空無奈又在長街把字賣到夜晚宿在城北古廟中聞人說伯雄也隨李正去我叔侄無錢不能那邊行適纔間賣字從此過看門首貼著招師榜一封我效那毛遂來自薦也不知大人肯容不肯容元首他說罷前後話話說候元首說罷前後一片言語老安人從那邊嘆道這都是為我母子讓恩人受了這些折磨讓我母子怎麼忍的雲大人也從那邊說道元首先生到此真乃是天然有分就在我家中教這幾個小孩兒吧遂又叫家人到北古廟中把寇珍接來與他叔侄換上新衣服於是擺酒宴慶賀先生飲酒之間在霄說道這幾個兒童就教先生分神了元首說若不棄嫌僕自能盡心教誨在霄說先生說的那裡話來當日天色已晚將他叔侄安排在書房安歇第二日安重根雲在岫雲落峰寇珍一齊拜了師眾人上學讀書又呆了幾日陳月李聽說元首又教了書遂把他的兒子陳金思侄兒陳金暇送來後又有岳公孫子寄王慎之蕭鑒趙適中一班人全從元首受業暫且不表單說寇本良兄弟騎著那馬走一晝一夜就離平壤落二三百里路了尋思後邊退追兵也不能有遂到了店中打打尖喂喂馬又走二天到了平壤城內找著雲府兄弟二人下了馬見一個門軍在那邊站著本良上前說道你去上內傳稟你家大人得知就說有漢城寇府來人要見門軍進去報於在霄在霄說道讓他進來吧於是將本良兄弟領進去了見了在霄在霄認得是寇本良說道侄兒怎麼到此又指著本峰說道此小兒是何人本良答道我叔父儒臣的兒子本峰在霄說道你兄弟二人為何到此本良長嘆了幾聲說道伯父不知聽小侄道來本良開言道伯父你是聽問我怎到此讓人痛傷情寇本良未從開口淚珠橫尊了聲伯父大人細耳聽從那年跟著法美打一仗咱們朝中只到如今未安寧先有那金氏宏集來賣法後又有金玉均來狗奸雄暗地裡勾引日本把京進殘殺黎民百姓害公卿到後來宏集奸臣開了斬金玉均也逃奔在日本東京閔娘娘皇官以內把政掌這幾年國中稍稍得太平那知道又出個奸賊朴泳孝他與那日本勾手胡亂行滿朝中臣宰全與他一黨將天子皇后全都一旁扔閔娘娘看出奸賊無好意暗地裡將叔父召進宮想只要除了奸臣那一黨只怕著現在手下無有兵因此纔皇后親自寫了一封信他命我伯父這邊來班搬兵前夜晚娘娘出官未回轉想必是被那奸臣把命坑也不知那個機密怎麼漏奸臣們一齊行了凶朴泳孝金殿以上奏一本他言語我叔父與你反心生立逼皇上把旨意下領人馬來到我們的家中將我的一家人口全綁去大略著難保那命殘生寇本峰送我出城外所以未遭奸賊毒手中後有那李樹蕭與我們把信送又賜我一匹馬追風因此我們兄弟纔逃了難望伯父快快與我報冤橫說罷又把那娘娘的信遞過去雲大人拆開從上看分明大略著沒有別的事也就是讓在霄發兵除奸佞雲在霄聽說前後一些話不由的無名大火望上昇手指著漢城高聲罵罵了聲朴泳孝來老雜種娘娘寇氏與你何仇恨你要害了他們活性命我今不把你們除治了枉在陽間走一程說著惱來道著怒令旗令箭拿手中立刻間點了十萬人共馬剋日就望漢城行這日正然望前走忽見那迎面以上來股兵話說雲在霄當日聽著這個信息對著本良說道你家人大概是被害了你兄弟兩個就在這念書吧我就與你們報仇去本良兄弟遂上了學在霄就點了十萬人馬撲奔漢城而去這日正望前去行只見迎面來了一伙人馬約有一千餘人在霄命探子去探探了一回回來說道他們說是領皇上之意調大人的在霄說不用說了一定是那奸臣的一黨等到跟前你們全與我拿住趕到了跟前忽拉一圍把他們全都拿住了霍建修說道你們是那裡的兵丁敢綁天子親使在霄說甚麼親使不親使的於是命兵丁紮下營寨將霍建修帶上來在霄問道你找什麼親使建修說我奉天子命令上平壤調雲在霄你們快快將我放了要誤了大事你們可擔罪不起雲在霄哈哈大笑說我就是雲在霄你調吧我知你是朴泳孝的一黨我且問你那寇儒臣家怎樣建修說道全都斬首了只有兩個家人一個公子不知那鄉去了在霄又問道何人說儒臣與我謀反建修不說在霄說你著實說來我饒了你的命要不然我斬你的首建修無奈就將朴泳孝造假信的事由說了一遍在霄又問他說那閔娘娘是誰害的建修說不知道了在霄說軍士們與我推出去殺建修慌忙說道大人別忙我知道了在霄說你知道快快說來建修遂將怎麼定的計策怎麼殺的將屍首扔在那井裡一五一十的全都說了在霄這纔將霍建修綁上拉在車上到了漢城先將朴泳孝全家拿住又將那鄭秉夏趙義淵禹范無李東鴻李范東李臣孝權榮重那些個奸黨全都拿住聯霍建修一齊綁到法場斬首又將娘娘的事奏明天子天子命人在井中將閔皇后屍首撈出成殮又將寇儒臣家的屍首找著成殮在一個大棺材內拿著朴泳孝與霍建修的靈祭奠了將寇家的棺槨埋葬了雲在霄辭別天子回到平壤正是朝中奸黨纔除盡全羅禍水又生根要知後事如何且聽下回分解
