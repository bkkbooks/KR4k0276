伊藤一聽這話暗自想道這人是姓甚名誰並且他這炸彈韓國人也不能會制其中必有原故再説此人要想行刺不能他一個人我想要將此城中之鼓動百姓與這個行刺的黨徒可得用個甚麼法能知道尋思一會忽然計上眉峰説我何不雇此處的人讓他與我訪聽要是有人打聽著實據我給他五百元錢他國人見財就能替我辦事主意已定遂將這事告訴於振東三郎振東三郎就雇了些高麗人在外打聽這日來了一個二十歲的人見振東三郎振東三郎領著見伊藤伊藤命通事問他説你姓甚名誰將那刺客的原因並他的黨羽一一的説來那人對著通事可就講起來了那個人站在那邊開了聲尊了聲通事老爺聽分明我小子姓關名字叫關富有一個外號叫作一包膿家住在南門以外東胡同行刺那些事兒我知的清他的家與我離不遠他的名字叫嶽公他師傅姓侯名元首在雲府教書誨童蒙嶽公的同學也有十幾個前幾年一齊遊學赴美京侯元首他在家中開報館專講究勸化百姓救生靈今年裡嶽公遊學回家轉還有那寇氏本良人幾名寇本良在這城中立宣講著整天裡講究自治瞎咕噥嶽公他一心要把統監刺寇本良與他做了炸彈物一宗這事情我寡知道人三個就是那元首本良與嶽公我怎麼能知他們是同黨這裡頭有個原因在其中侯元首有個使人叫李九我二人本是八拜好賓朋這事情全是李九對我講所以我才知內裡那情形這本是三三見九實情話並無一句虛言來假告誦五百元錢快快給我我好與李九分贓飲劉伶那通事聽罷關富一些話他這才對這伊藤把話明話説那通事聽罷關富一片言語遂對伊藤一説伊藤又讓通事問那關富説那侯元首寇本良現在那裡通事又問關富關富説在雲在霄府前門房報館望住著通事又對伊藤以一學伊藤遂與關富五百元錢遂派了十幾名巡警讓關富領著去上雲府拿寇本良侯元首二人以外又多給關富十元錢作為酬勞關富得了錢遂領著巡警上雲府拿人這且不表再説這領事衙門有一個茶童名喚林中秀本是韓國人原先在侯弼報館內當過茶童皆因家貧元首常周濟他後來因為別的原故不在那處就上日本領事衙門與那振東三郎當茶童當日聽關富説元首與嶽公是一黨他就知道伊藤一聽這話必不能幹休他偷著跑到元首報館這時候元首正與本良在那間論伊藤這次來不知因為啥事又見林中秀歇歇喘喘跑進來説你二人快逃命吧元首説因為甚麼林中秀説伊藤自從嶽公刺他以後他就常常打聽嶽公的黨羽今天有一個關富貪了五百元錢説你二人與嶽公一黨並把那做炸彈之事全都説了我想日本人不久就要派人來拿你二人來了要不速逃恐怕性命難保本良説事到其逼就得躲躲為妙元首説可也是遂急忙備上一匹馬也靡顧拾道掇煞啥元首騎馬本良步行師徒逃難而去那林中秀也不回領事衙門自己去了單説關富領著巡警到了街口撞著李九從那邊來關富説他二人在家沒有李九説我早晨出來的方才我迎著他二人慌慌張張望東北去了你們快趕去吧才走不遠關富一聽可就領著巡警撲奔東北趕下來了這關富本是一個古董星只為那五百元錢把壞生對著那振東三郎把話講硬説是元首本良要革命賊關富領著巡警報館去要捉那元首本良人二名不是那林氏中秀把信送他二人性命一個保不成賊李九從中又把壞來使關富他才領著巡警東北行他二人方才出了北門外又聽的後邊人馬喊連聲他二人一見勢不好急忙忙往前跑個凶該著元首命運盡坐下馬忽然跌倒地流平衆巡警後邊開槍打可惜元首一命歸陰城寇本良邁開大步望前跑你看他一溜栽花影無蹤本良他逃命不知何處往只剩下元首死尸臥道中可憐他一腔豪氣從今盡可憐他滿腹經綸今日傾再不能鼓動學生遊美國再不能發行報紙化群生韓國裡今日死了侯元首少一個保國圖存大英雄可嘆他從小伶仃命運苦可嘆他心志堅固赴美京可嘆他教練農備操鄉勇可嘆他奇峰山上打賊丁可嘆他保全重根母子命可嘆他飄零在外好幾冬可嘆他降志辱身沒設祖帳可嘆他巧言義説金有聲種種的懮國懮民苦心志落了個槍穿肚腹血濺身形數十年英名一旦附流水到倒把那回天志氣落場空恨只恨賊子關富貪財賄害的那元首義士好苦情縱然是五百元錢將你買也不該拿著仇人當恩公這麼人咱們中國也不少要得著生吃他肉也不嫌腥像這個狼心狗肺誰不恨得到手就當把他性命坑這些事咱們押下且不表再把那關富賊子明一明話説關富領著巡警將侯元首打死又去趕寇本良那寇本良兩條快腿他們那能趕的上用槍打也莫沒打著只得將元首尸首交於振東三郎關富自己去了單説伊藤聽説將侯弼害死心中甚是快樂遂將嶽公侯弼二人的尸首用棺停盛殮了説是此二人雖是刺我到倒算你韓國兩個志士我不能不張大他二人的節義這是伊藤邀買人心的法子由著元首一死本良一逃那平壤城裡是宣講所報館全都無了那伊藤越發的放心了住了一個多月就回了漢城不表單説雲府與嶽家將他二人的棺槨領來各人拉到各人家裡那侯元首的棺槨雲在霄接在府中好好的祭奠祭奠他那些門人朋友都全來哭吊後來選塊吉地埋葬起來時人有詩贊侯元首曰身悲國弱血心兢無過韓人元首公雖事未成身殞命尚留忠義照韓京話説雲府將元首埋葬以後歸至家中光陰茬苒不覺過了新年這日雲老大人正在書房觀書只見家人呈上一封信來要知此信是從哪裡來的且聽下回分解
