body:
  text: 第十八回索國債監埋財政傷人命強奪警權衣服好比巡警血脈好比銀錢有衣遮遞體不能寒血脈流通身健二者相輔並重缺一就得未玩完有識之士痛時艱全在經濟困難西江月罷書接上回上回書説的是那高麗歸了日本保護他國一個政治衙門全安上一個日本人幫著辦理可見他國的君臣全都任然不懂把自己國的政事讓人家替著他們辦理還以為是相香應一起手辦甚麼事情全都跟韓國的君臣商量到後來把那個韓國的君臣就扔在開外了無論辦什麼事情人家日本人説煞就是煞那韓國君臣互相聾子耳朵一般你看他們不但拿著不著意還等著把政治改好了安然享太平福呢不知那日本人如虎似狼到嘴的肉那有吐出來的況且説那日本素日想只要吞高麗就愁那韓國的權力到不了他的手今天可一下子到了他的手他能夠放鬆嗎高麗無謀把權力送與外人之手我中國看看高麗的前轍自己也當加點小心哪間話少説單説伊藤自從把高麗種種的權力全攬到手裡可就讓他們在高麗的日本人盡力捉鬧那高麗人民受他們的欺壓實在是讓人難言哪由此一年多那韓國的利權一多半都歸於日本人的手中高麗又與伊藤修下一個統監衙門這日伊藤正在衙門悶坐觀書忽然想起一宗大事來遂命人套上快車去上那高麗的政府到了門首下車李完用等接至屋中分賓主坐下一齊向伊藤説道統監大人今日到此有何事相商呢伊藤説無事不敢到此列位大人要問聽我慢慢的道來好一個智廣謀多伊藤君你看他未從開口笑吟吟尊了聲列位大人且洗耳我今日有一件事情對你們陳那一年你們國內起了亂無故的攻破我國領事門殺傷了我國商人好幾百又要害我那領事花房君多虧了英國商船救了命若不然性命一定歸了陰那時節我國派兵來問罪你國裡包了五十餘萬金這個金那時未能付於我言説是指地作保利三分這是那第一回該我們的款還有那第二回賠款中三萬金第二回賠款不為別的事因為是你國大臣金玉均他一心要在你國謀變法去想求我國領事對發軍到後來我們被中國打敗了因此才包我十三萬兩好紋銀也説是按年行上三分利到今日合計起來十六春本利和共合也有三百萬至如今未給我們一兩銀我國裡那日與我打來電言説是新練兩鎮大陸軍讓我在此與你們把帳討好給那新練之軍作餉銀要不著我國養兵用的緊也不能來與諸公把帳尋諸公們怎的也得奏封上那管賣土地也得還我銀我今日緩上你國一月限到日子就得與我送到門到那時要是將錢送不到就苦了我國那些充軍人要實在無錢還我們的債我還有兩條道兒面前陳第一是無錢將地賣與我京畿這亂值三百萬兩銀第二是你國財政我監理出入款項你不得與聞用將去上我那衙門領不讓你們妄費半毫分省多少好與你欠債償免去了貪官污吏來侵吞你國人不知理財為何物拿著生財求富置妄聞要知道生財求富的富庶也不能讓那飢荒屯了門這兩樣你們必得從一樣説甚麼也得還我這項銀要有銀還我可比這件好我恐怕你們無處把銀尋諸公回去好好想想吧一日之帳是實雲這伊藤説罷一些話到把那李完用等嚇吊魂話説李完用諸人聞伊藤説了一片要錢的話一個個目瞪口呆半晌方説道我因此時窮的靡法那有還帳的錢呢伊藤説靡錢也不行我國等只這個作兵餉呢你們要不還我的錢我國用甚麼養兵反正一月之限湊足了更好要湊不足到那時可也就講不了給我們地或是讓我們監理你們財政望下不用説了説完了就上車回統監府去單説李完用等即當日商量了一會誰也靡有法子遂稟於他的皇上李熙李熙也是沒章程遂又商量了一回指他們的百姓那百姓誰也不出錢可知那外國的百姓一個個是任煞啥不懂要是知道的好了把國債大夥湊吧攤吧還上日本也説不能監理財政了因為他們皆存自私的心思不肯出錢還國債那知道你不還人家錢人家不是要你的地就是把你的財政權把過去財政是國家的血脈將血脈讓人家把守著國家能自不亡嗎咱們中國該人家外國錢比那高麗還多著多少倍這幾年外人常想只要監中國的財政要是咱們的財政權一讓於外人把過去也就離完不遠啦諸公們好好想想吧間話少説單説李完用等籌備這個錢眼看一個月也靡顛對妥無奈到了統監衙門對伊藤以一説伊藤説既靡有也講不了別的反正都兩條道你們是從那條吧他們又求緩日限伊藤搖頭不答應李完用等看看靡法遂許伊藤監理他國的財政趕到財政權到了日本人的手裡是大韓的稅務錢糧王租所有一概入款的事情全歸伊藤管理那韓國想要作甚麼事辦甚麼政治伊藤也不給他的錢花都説是你們該我們那些錢我給你們省著還債呢你們只知無故的化費我們這錢你們可得何日還呢由此那高麗財政一失可就不好了伊藤他本是一個毒辣男一心要奪取高麗財政權錢財好比人血脈缺一點説得把病添若是血脈全靡有這個人立刻就來完世上人誰能不把錢財用論起來是人生命第二天一無就邁不動了步雖是那英雄豪傑也犯難為無錢愁倒多少英雄漢因此那貧窮之人把擔擔都只為衣食房屋無處取無奈才受苦挨餒在外邊有錢的吃著喝嫖賭瞎胡鬧創下了急飢荒債主賽如山有一日人家與他把錢要他就得折賣房産作償還房屋地産全賣盡剩下了隻身一人好可憐到後來衣食無錢凍餓死想想當初怎麼不淒然看起來國家與人一個樣財政去甚麼政治不能頒高麗國財政歸於伊藤管那錢糧全得歸在他手間是凡那豬馬牛羊皆有稅那日本賊察查的分外嚴有一點漏稅就得加重辦可憐那高麗人民受熬煎將款項全是收在他的手你想要用上一文難上難高麗國諸般政治不能辦他君臣一天無事飽三餐各衙門政事全歸日本管那高麗好相像附屬物一般有國家不能把政事來辦怎能夠圖存疆土保全安那高麗的君臣固然是昏懦輩依我看他的百姓也是蠢愚蠻你國債就是你們家的債誰能夠來替你們把帳還你們若是不出錢來把債償人家就要你們人民與江山就是不把你們人民江山要他定要監理你國財政權財政本是國家的命脈失財政國家就要快來完國要是被那外人滅你們家甚麼能夠來保全國家二字本是緊相靠諸公心中仔細想一番咱中國外債好幾千萬衆明公八成未曾聽人言都因為甲午庚子那幾仗才拉下國債急飢荒重如山外國也常跟咱們把錢要也常想把咱國的財政監現如今各省全有籌還國債會諸公們可以上那捐上幾個錢欠外國的飢荒要全還上東三省或者可以能保全衆明公看看高麗想想自己中國也就列高麗那樣般要等著財政到了人家手那時節有甚麼方法也妄然練兵無錢不能練有槍炮無錢更犯難到那時甘坐來待斃衆明公你看可憐不可憐這本是至理明言真情話別拿著這些話兒當間談我今日説到此處腮落淚望諸公仔細參一參押下此事咱們且不表再把那日本行凶言一番話説漢城東關有一家姓周哥三個長曰周忠次曰周孝老三曰周義家裡有二處房舍一處在道南一處在道北道南那處房子自己家裡住著道北那處房子招戶偏偏説招了一個日本人名叫吉田在那開藥鋪三間房子言明一個月納房銀三十吊每月月底打齊這日周忠得了一個兒子四五天上長了一個疙疸很利害周忠就到那日本藥鋪去買了一點藥拿了問價錢那吉田回道咱們一個東伙還講甚麼錢那拿著上去吧周忠説道可使不得的這吉田擺頭不肯要錢周忠家中等著用藥救急也就忙只回去了到了家中將藥上上也沒見好呆了只一天把小孩也就扔了這且不在話下單説那吉田將房子住了許多月也靡給周忠打房銀這日周忠去向他要錢吉田説趕上這日靡錢請改日再還吧周忠尋思原先要人家藥都靡要錢也就未肯深説就回去了又呆了兩月周忠又去要房銀吉田説這事很對不起你下月我務必給你打周忠尋思三四個月都緩啦這一月就不能等了遂又緩了一個月這日他們哥三個一齊前去跟吉田要錢吉田説我還是靡錢周忠説我已經寬五個月你怎麼今天還説靡錢呢那管不能全給我先給我三月的房銀我有點要緊的用項那個咱們就放著吉田就變臉説道我不肯跟你們深拘你這一個計的不要臉那日你買我那藥也值二百吊怎麼就不勾你這幾月的房銀呢周忠説你不説不要錢嗎吉田説誰説不要錢來的那時你問我價錢我説是二百吊你就拿著走了你這五個月的房銀才一百五十吊去了你的還該我五十吊呢我今天還要管你要錢呢周義周孝從那邊説道那有那麼貴的藥貴不貴的也不用説那讓我們用來的呢講不起與你合上三十吊去一月的房銀這四月的今天非給不可吉田説那算不行非給我五十吊錢不可他們三言兩説打起來了吉田看他們人多拿起槍來就打了兩下把周忠周義打死周孝見勢不好跑到街上報於巡警趕到巡警進了屋中那吉田早跑了周孝一見吉田跑了他就上那外務部告狀去了單説那吉田跑到他們的統監衙門見了伊藤説道小人在街上周忠的房子開藥鋪那周忠買藥不給錢還向我硬要房銀我説是你該我的藥錢去了該你的房銀還欠我五十吊呢我就與他們要錢他們不但不給錢還仗著人多打我我無計可施才傷了他兩條人命望大人與小人作主吧伊藤以一聽眉頭一皺皺計上心中這事不要緊我把你綁上到在他們外務部自有辦法管保不能讓你受屈於是將吉田綁上坐上車子到了外務部見了尚書金炳之這個時候周孝早把呈子遞上去了當日金炳之見伊藤來到説道統監大人到此八成為那人命的事情吧伊藤説正是我還有一件事情相商金炳之説大人有甚麼事情儘管講來伊藤説既然如此待我道來這伊藤未從開口面帶歡尊了聲炳之大人聽我言只因為日韓定下通商約我國人才來貿易到這邊那吉田在這街上開藥鋪租了那周忠房子整三間當面裡房租銀子講的妥這説是一月拿上三十吊錢因為那周忠兒子得了病前去買藥向吉田將藥買去無其數一共合了二百吊錢吉田欠周忠房銀一百五十吊去了他的還欠吉田五十吊錢他兄弟藥錢不算房錢要才惹那吉田把槍轟他哥兩個一齊把吉田打那吉田無奈才動了野蠻用槍打死他們哥兩個才惹出日韓交涉這一番我國傷人無有死罪不能與你法律一樣般吉田傷了人命算有罪我發他充軍在外十二年這個事情算拉倒我還有一件事情向你言你國人無故來把人欺壓巡警他因為甚麼不遮攔巡警本專管打仗和鬥毆還保護別國人民在這邊我國人你們巡警不保護簡直的事來欺侮咱像這樣巡警要他中何用妄耗費你國多少銀子錢到不如將他撤了去將我國的巡警這塊安也省著我國人受他的氣你國裡也能得點安然吉田事就是那樣辦巡警明日我就安允不允的我不管的我還要回去間一間説罷坐上車子回衙去倒把那金氏炳之嚇一川躥話説伊藤將吉田傷人的案子硬壓著辦了又要撤高麗的巡警安他國的巡警把金炳之嚇的面目改色那周孝又追金炳之給他報仇金炳之説道現在咱國的權柄全在他的手裡這是這個事還跟咱們辦要是別的事情人家都不理咱們我明知道你是含冤但是我一點權柄靡有那也是無可如何你回去自己想法報仇去吧周孝無奈何回到家中將周忠周義的尸首成殮起